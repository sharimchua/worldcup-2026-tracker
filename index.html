<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 World Cup · Family Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green:   #1a7a4a;
  --green-l: #e6f4ec;
  --gold:    #c9a84c;
  --gold-l:  #fdf6e3;
  --red:     #c0392b;
  --red-l:   #fdecea;
  --ink:     #1a1a1a;
  --ink-2:   #444;
  --ink-3:   #888;
  --border:  #e0e0e0;
  --bg:      #f7f6f2;
  --card:    #ffffff;
  --radius:  10px;

  --ali:  #1a5276; --ali-l: #d6eaf8; --ali-chip: #1a5276;
  --ele:  #6c3483; --ele-l: #e8daef; --ele-chip: #6c3483;
  --cal:  #784212; --cal-l: #fdebd0; --cal-chip: #784212;
  --sha:  #145a32; --sha-l: #d5f5e3; --sha-chip: #145a32;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
}

/* ── HEADER ── */
.site-header {
  background: var(--ink);
  color: #fff;
  padding: 0 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
  position: sticky;
  top: 0;
  z-index: 100;
  gap: 12px;
}
.site-header h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: .06em;
  white-space: nowrap;
}
.site-header h1 span { color: var(--gold); }
.header-right { display: flex; align-items: center; gap: 10px; }
#data-src { font-size: 11px; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 260px; }
.refresh-btn {
  background: none; border: 1px solid #444; border-radius: 6px;
  color: #ccc; font-size: 12px; padding: 5px 12px; cursor: pointer;
  font-family: 'DM Sans', sans-serif; white-space: nowrap;
  transition: border-color .15s, color .15s;
}
.refresh-btn:hover { border-color: var(--gold); color: var(--gold); }

/* ── NAV ── */
.nav-bar {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
}
.nav-bar::-webkit-scrollbar { display: none; }
.nav-tab {
  padding: 12px 20px; font-size: 13px; font-weight: 500;
  background: none; border: none; cursor: pointer;
  color: var(--ink-3); border-bottom: 2px solid transparent;
  white-space: nowrap; font-family: 'DM Sans', sans-serif;
  transition: color .15s;
}
.nav-tab.on { color: var(--ink); border-bottom-color: var(--green); }
.nav-tab:hover:not(.on) { color: var(--ink-2); }

/* ── LAYOUT ── */
.page { display: none; padding: 1.5rem; max-width: 1100px; margin: 0 auto; }
.page.on { display: block; }

/* ── SUMMARY METRICS ── */
.metrics { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 1.5rem; }
.metric {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1rem; text-align: center;
}
.metric-val { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--ink); line-height: 1; }
.metric-lbl { font-size: 11px; color: var(--ink-3); margin-top: 4px; text-transform: uppercase; letter-spacing: .05em; }

/* ── TIER LEGEND ── */
.tier-legend { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.25rem; }
.t-badge { font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 500; }
.t1 { background: #ede9fe; color: #4c1d95; }
.t2 { background: #dcfce7; color: #14532d; }
.t3 { background: #fff7ed; color: #7c2d12; }
.t4 { background: #fef2f2; color: #7f1d1d; }

/* ── MEMBER CARDS ── */
.member-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(270px,1fr)); gap: 14px; }
.member-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
}
.member-card-header {
  padding: .9rem 1.1rem; display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--border);
}
.avatar {
  width: 42px; height: 42px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 600; font-size: 13px; flex-shrink: 0;
}
.member-name { font-size: 15px; font-weight: 600; }
.member-stat { font-size: 12px; color: var(--ink-3); margin-top: 2px; }
.progress-bar { height: 4px; border-radius: 2px; background: var(--border); margin-top: 6px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 2px; transition: width .5s ease; }
.team-list { padding: .6rem .8rem; display: flex; flex-direction: column; gap: 4px; }
.team-row {
  display: flex; align-items: center; gap: 7px;
  padding: 5px 7px; border-radius: 7px;
  background: var(--bg); transition: opacity .2s;
}
.team-row.out { opacity: .35; }
.team-row.out .team-name { text-decoration: line-through; }
.team-flag { font-size: 16px; width: 22px; text-align: center; flex-shrink: 0; }
.team-name { font-size: 12px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.dot-in  { background: var(--green); }
.dot-out { background: var(--red); }
.ko-btn {
  background: none; border: none; cursor: pointer;
  font-size: 13px; color: var(--ink-3); padding: 0 2px; line-height: 1;
  transition: color .15s;
}
.ko-btn:hover { color: var(--ink); }

/* ── CALENDAR ── */
.cal-filters {
  display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1.25rem; align-items: center;
}
.cal-filters select, .cal-filters label {
  font-size: 13px; font-family: 'DM Sans', sans-serif;
  height: 34px; padding: 0 10px;
  border: 1px solid var(--border); border-radius: 7px;
  background: var(--card); color: var(--ink); cursor: pointer;
}
.cal-filters label { display: flex; align-items: center; gap: 6px; padding: 0 12px; cursor: pointer; }

.day-block { margin-bottom: 1.5rem; }
.day-heading {
  font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: .06em;
  color: var(--ink-2); margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
  padding-bottom: 5px; border-bottom: 1px solid var(--border);
}
.today-pill {
  font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 600;
  background: var(--green); color: #fff; padding: 2px 8px; border-radius: 20px;
  letter-spacing: .04em;
}
.played-count { font-size: 11px; color: var(--ink-3); font-family: 'DM Sans', sans-serif; font-weight: 400; margin-left: auto; }

.match-row {
  display: flex; align-items: center; gap: 10px; padding: 9px 12px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); margin-bottom: 5px;
  transition: border-color .15s;
}
.match-row.my-match { border-left: 3px solid var(--green); }
.match-row.scored { background: var(--card); }
.match-time { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--ink-3); min-width: 38px; flex-shrink: 0; }
.match-side { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; }
.match-side.right { justify-content: flex-end; }
.match-team-name { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px; }
.match-score {
  font-family: 'Bebas Neue', sans-serif; font-size: 18px; min-width: 48px;
  text-align: center; color: var(--ink); flex-shrink: 0;
}
.match-score.tbd { font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--ink-3); }
.match-venue { font-size: 11px; color: var(--ink-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; }
.round-pill {
  font-size: 10px; padding: 2px 7px; border-radius: 20px;
  background: var(--bg); color: var(--ink-3); white-space: nowrap; flex-shrink: 0;
}
.owner-chip { font-size: 10px; padding: 1px 6px; border-radius: 20px; font-weight: 600; flex-shrink: 0; }

/* ── RESULTS ── */
.results-round-heading {
  font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: .05em;
  color: var(--ink-2); margin: 1.2rem 0 7px; padding-bottom: 4px; border-bottom: 1px solid var(--border);
}
.result-row {
  display: flex; align-items: center; gap: 10px; padding: 8px 12px;
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  margin-bottom: 5px;
}

/* ── GROUPS ── */
.groups-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap: 12px; }
.group-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.group-title {
  font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: .08em;
  padding: .6rem 1rem; background: var(--ink); color: var(--gold);
}
.group-team {
  display: flex; align-items: center; gap: 7px;
  padding: 7px 10px; border-bottom: 1px solid var(--border);
  transition: opacity .2s;
}
.group-team:last-child { border-bottom: none; }
.group-team.out { opacity: .35; }
.group-team.out .g-name { text-decoration: line-through; }
.g-flag { font-size: 15px; width: 20px; text-align: center; }
.g-name { font-size: 12px; flex: 1; }

/* ── EMPTY STATE ── */
.empty {
  text-align: center; padding: 3rem 1rem; color: var(--ink-3); font-size: 14px;
  border: 1px dashed var(--border); border-radius: var(--radius);
}
.empty strong { display: block; font-size: 18px; margin-bottom: 6px; color: var(--ink-2); }

/* ── SPIN ── */
@keyframes spin { to { transform: rotate(360deg); } }
.spin { display: inline-block; animation: spin .7s linear infinite; }

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  .metrics { grid-template-columns: repeat(2,1fr); }
  .match-venue, #data-src { display: none; }
  .match-team-name { max-width: 80px; }
}
</style>
</head>

let MATCHES = EMBEDDED.map(m => ({...m, a: norm(m.a), b: norm(m.b)}));

/* ─────────────────────────────────────────────
   STATE
───────────────────────────────────────────── */
let S = { alloc: null, knocked: {}, lastSync: null };

function loadState() {
  try { const s = localStorage.getItem('wc26_family'); if (s) S = JSON.parse(s); } catch(e) {}
  if (!S.alloc) { S.alloc = allocate(); saveState(); }
  if (!S.knocked) S.knocked = {};
}
function saveState() { try { localStorage.setItem('wc26_family', JSON.stringify(S)); } catch(e) {} }

/* ─────────────────────────────────────────────
   ALLOCATION  (balanced by tier, done once)
───────────────────────────────────────────── */
function allocate() {
  const pools = {};
  [1,2,3,4].forEach(t => { pools[t] = TEAMS.filter(x => x.tier === t).map(x => x.name); shuffle(pools[t]); });
  const a = {}; MEMBERS.forEach(m => a[m] = []);
  [1,2,3,4].forEach(t => { pools[t].forEach((name, i) => a[MEMBERS[i % 4]].push(name)); });
  return a;
}
function shuffle(a) { for (let i = a.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } }

/* ─────────────────────────────────────────────
   HELPERS
───────────────────────────────────────────── */
function getTeam(n) { return TEAMS.find(t => t.name === n); }
function getOwner(n) { for (const m of MEMBERS) { if (S.alloc[m].includes(n)) return m; } return null; }
function isOut(n) { return !!S.knocked[n]; }

function ownerChip(owner) {
  if (!owner) return '';
  const c = MC[owner];
  return `<span class="owner-chip" style="background:${c.bg};color:${c.chip}">${owner.substring(0,3)}</span>`;
}

const KO_ROUNDS = ['Round of 32','Round of 16','Quarter-final','Semi-final','Final','Match for third place'];

function autoKnockouts() {
  MATCHES.filter(m => m.s1 !== undefined && KO_ROUNDS.includes(m.r)).forEach(m => {
    if (!getTeam(m.a) || !getTeam(m.b)) return;
    if (m.s1 > m.s2) S.knocked[m.b] = true;
    else if (m.s2 > m.s1) S.knocked[m.a] = true;
  });
  saveState();
}

/* ─────────────────────────────────────────────
   REFRESH  (openfootball via jsdelivr CDN)
───────────────────────────────────────────── */
async function doRefresh() {
  const ic = document.getElementById('ref-icon');
  ic.className = 'spin'; ic.textContent = '↻';
  try {
    const r = await fetch('https://cdn.jsdelivr.net/gh/openfootball/worldcup.json@master/2026/worldcup.json', {cache:'no-cache'});
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    MATCHES = d.matches.map(m => ({
      r: m.round, d: m.date, t: (m.time||'').substring(0,5),
      a: norm(m.team1), b: norm(m.team2),
      g: (m.group||'').replace('Group ',''),
      v: m.ground || '',
      ...(m.score1 !== undefined ? {s1: m.score1, s2: m.score2} : {})
    }));
    const scored = MATCHES.filter(m => m.s1 !== undefined).length;
    S.lastSync = new Date().toISOString();
    saveState();
    setStatus(`openfootball · ${MATCHES.length} matches · ${scored} results · updated ${new Date().toLocaleTimeString()}`);
    autoKnockouts();
  } catch(e) {
    setStatus(`Embedded schedule · ${EMBEDDED.length} matches · refresh failed (${e.message})`);
  }
  ic.className = ''; ic.textContent = '↻';
  render();
}

function setStatus(msg) { document.getElementById('data-src').textContent = msg; }

/* ─────────────────────────────────────────────
   RENDER: DASHBOARD
───────────────────────────────────────────── */
function renderDash() {
  const el = document.getElementById('page-dash');
  const allAlive = TEAMS.filter(t => !isOut(t.name)).length;
  const scored = MATCHES.filter(m => m.s1 !== undefined).length;

  let h = `<div class="metrics">
    <div class="metric"><div class="metric-val">${allAlive}</div><div class="metric-lbl">Teams still in</div></div>
    <div class="metric"><div class="metric-val">${48-allAlive}</div><div class="metric-lbl">Knocked out</div></div>
    <div class="metric"><div class="metric-val">${scored}</div><div class="metric-lbl">Matches played</div></div>
    <div class="metric"><div class="metric-val">${104-scored}</div><div class="metric-lbl">To go</div></div>
  </div>
  <div class="tier-legend">
    <span class="t-badge t1">Tier 1 · Elite</span>
    <span class="t-badge t2">Tier 2 · Strong</span>
    <span class="t-badge t3">Tier 3 · Competitive</span>
    <span class="t-badge t4">Tier 4 · Underdog</span>
  </div>
  <div class="member-grid">`;

  MEMBERS.forEach(m => {
    const alive = S.alloc[m].filter(t => !isOut(t)).length;
    const total = S.alloc[m].length;
    const pct = Math.round((alive/total)*100);
    const c = MC[m];
    h += `<div class="member-card">
      <div class="member-card-header">
        <div class="avatar" style="background:${c.bg};color:${c.chip}">${INIT[m]}</div>
        <div style="flex:1">
          <div class="member-name">${m}</div>
          <div class="member-stat">${alive} of ${total} teams remaining · ${pct}%</div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${c.chip}"></div></div>
        </div>
      </div>
      <div class="team-list">`;
    S.alloc[m].forEach(tn => {
      const t = getTeam(tn); if (!t) return;
      const out = isOut(tn);
      h += `<div class="team-row${out?' out':''}">
        <span class="team-flag">${t.flag}</span>
        <span class="team-name">${t.name}</span>
        <span class="t-badge t${t.tier}" style="font-size:10px">T${t.tier}</span>
        <span class="status-dot ${out?'dot-out':'dot-in'}"></span>
        <button class="ko-btn" onclick="toggleKO('${tn.replace(/'/g,"\\'")}',this)" title="${out?'Reinstate':'Mark knocked out'}">${out?'↩':'✕'}</button>
      </div>`;
    });
    h += `</div></div>`;
  });
  h += `</div>`;
  el.innerHTML = h;
}

/* ─────────────────────────────────────────────
   RENDER: CALENDAR
───────────────────────────────────────────── */
let CAL_MEMBER = 'all';
let CAL_ROUND  = 'all';
let CAL_SCORES = true;

function renderCal() {
  const el = document.getElementById('page-cal');
  const today = new Date().toISOString().slice(0,10);
  const myTeams = CAL_MEMBER !== 'all' ? new Set(S.alloc[CAL_MEMBER]) : null;
  const rounds = [...new Set(MATCHES.map(m => m.r))];

  let visible = MATCHES.filter(m => {
    if (CAL_ROUND !== 'all' && m.r !== CAL_ROUND) return false;
    if (!CAL_SCORES && m.s1 !== undefined) return false;
    if (myTeams && !myTeams.has(m.a) && !myTeams.has(m.b)) return false;
    return true;
  });

  const byDay = {};
  visible.forEach(m => { if (!byDay[m.d]) byDay[m.d] = []; byDay[m.d].push(m); });
  const days = Object.keys(byDay).sort();

  const memOpts = MEMBERS.map(m => `<option value="${m}"${CAL_MEMBER===m?'selected':''}>${m}</option>`).join('');
  const rndOpts = rounds.map(r => `<option value="${r}"${CAL_ROUND===r?'selected':''}>${r}</option>`).join('');

  let h = `<div class="cal-filters">
    <select onchange="CAL_MEMBER=this.value;renderCal()">
      <option value="all"${CAL_MEMBER==='all'?'selected':''}>All teams</option>${memOpts}
    </select>
    <select onchange="CAL_ROUND=this.value;renderCal()">
      <option value="all"${CAL_ROUND==='all'?'selected':''}>All rounds</option>${rndOpts}
    </select>
    <label><input type="checkbox" ${CAL_SCORES?'checked':''} onchange="CAL_SCORES=this.checked;renderCal()"> Show played</label>
  </div>`;

  if (!days.length) { h += `<div class="empty"><strong>No matches</strong>Try adjusting the filters above.</div>`; el.innerHTML = h; return; }

  days.forEach(day => {
    const ms = byDay[day].sort((a,b) => a.t.localeCompare(b.t));
    const isToday = day === today;
    const isPast  = day < today;
    const label   = new Date(day+'T12:00:00').toLocaleDateString('en-AU', {weekday:'long', day:'numeric', month:'long'});
    const playedCount = ms.filter(m => m.s1 !== undefined).length;

    h += `<div class="day-block">
      <div class="day-heading">
        ${label}
        ${isToday ? '<span class="today-pill">TODAY</span>' : ''}
        ${isPast && !isToday ? `<span class="played-count">${playedCount}/${ms.length} played</span>` : ''}
      </div>`;

    ms.forEach(m => {
      const scored = m.s1 !== undefined;
      const t1 = getTeam(m.a), t2 = getTeam(m.b);
      const o1 = getOwner(m.a), o2 = getOwner(m.b);
      const isMyMatch = myTeams && (myTeams.has(m.a) || myTeams.has(m.b));
      const ko1 = isOut(m.a), ko2 = isOut(m.b);

      h += `<div class="match-row${scored?' scored':''}${isMyMatch?' my-match':''}">
        <span class="match-time">${m.t}</span>
        <div class="match-side">
          <span style="font-size:16px">${t1?t1.flag:''}</span>
          <span class="match-team-name" style="${ko1?'text-decoration:line-through;opacity:.45':''}">${m.a}</span>
          ${ownerChip(o1)}
        </div>
        <div class="match-score${scored?'':' tbd'}">${scored ? m.s1+'–'+m.s2 : 'vs'}</div>
        <div class="match-side right">
          ${ownerChip(o2)}
          <span class="match-team-name" style="${ko2?'text-decoration:line-through;opacity:.45':''}">${m.b}</span>
          <span style="font-size:16px">${t2?t2.flag:''}</span>
        </div>
        <span class="match-venue">${m.v}</span>
        <span class="round-pill">${m.g ? 'Grp '+m.g : m.r.replace('Match for third place','3rd place')}</span>
      </div>`;
    });
    h += `</div>`;
  });

  el.innerHTML = h;

  // Scroll to today
  if (today >= (MATCHES[0]?.d||'')) {
    const todayEl = el.querySelector('.today-pill');
    if (todayEl) setTimeout(() => todayEl.closest('.day-block').scrollIntoView({behavior:'smooth',block:'start'}), 80);
  }
}

/* ─────────────────────────────────────────────
   RENDER: RESULTS
───────────────────────────────────────────── */
function renderResults() {
  const el = document.getElementById('page-results');
  const scored = MATCHES.filter(m => m.s1 !== undefined).sort((a,b) => b.d.localeCompare(a.d)||b.t.localeCompare(a.t));

  let h = `<p style="font-size:13px;color:var(--ink-3);margin-bottom:1rem">
    ${scored.length} results · pulled from <a href="https://github.com/openfootball/worldcup.json" target="_blank" style="color:var(--green)">openfootball</a> ·
    <a href="#" onclick="doRefresh();return false;" style="color:var(--green)">refresh now</a>
  </p>`;

  if (!scored.length) {
    h += `<div class="empty">
      <strong>No results yet</strong>
      The tournament kicks off 11 June 2026. Results will appear here automatically after each match — just hit Refresh.
    </div>`;
  } else {
    const byRound = {};
    scored.forEach(m => { if (!byRound[m.r]) byRound[m.r] = []; byRound[m.r].push(m); });
    Object.entries(byRound).forEach(([round, ms]) => {
      h += `<div class="results-round-heading">${round}</div>`;
      ms.forEach(m => {
        const t1 = getTeam(m.a), t2 = getTeam(m.b);
        const o1 = getOwner(m.a), o2 = getOwner(m.b);
        h += `<div class="result-row">
          <div class="match-side" style="flex:1">
            <span style="font-size:16px">${t1?t1.flag:''}</span>
            <span class="match-team-name${isOut(m.a)?' out':''}">${m.a}</span>
            ${ownerChip(o1)}
          </div>
          <div class="match-score">${m.s1}–${m.s2}</div>
          <div class="match-side right" style="flex:1">
            ${ownerChip(o2)}
            <span class="match-team-name${isOut(m.b)?' out':''}">${m.b}</span>
            <span style="font-size:16px">${t2?t2.flag:''}</span>
          </div>
          <span class="match-venue">${m.d}</span>
        </div>`;
      });
    });
  }
  el.innerHTML = h;
}

/* ─────────────────────────────────────────────
   RENDER: GROUPS
───────────────────────────────────────────── */
function renderGroups() {
  const el = document.getElementById('page-groups');
  const groups = ['A','B','C','D','E','F','G','H','I','J','K','L'];
  let h = `<div class="groups-grid">`;
  groups.forEach(g => {
    h += `<div class="group-card"><div class="group-title">Group ${g}</div>`;
    TEAMS.filter(t => t.group === g).forEach(t => {
      const owner = getOwner(t.name);
      const out = isOut(t.name);
      const c = owner ? MC[owner] : null;
      h += `<div class="group-team${out?' out':''}">
        <span class="g-flag">${t.flag}</span>
        <span class="g-name">${t.name}</span>
        <span class="t-badge t${t.tier}" style="font-size:9px">T${t.tier}</span>
        ${owner ? `<span class="owner-chip" style="background:${c.bg};color:${c.chip}">${owner.substring(0,3)}</span>` : ''}
      </div>`;
    });
    h += `</div>`;
  });
  h += `</div>`;
  el.innerHTML = h;
}

/* ─────────────────────────────────────────────
   INTERACTIONS
───────────────────────────────────────────── */
function toggleKO(name) {
  if (S.knocked[name]) delete S.knocked[name]; else S.knocked[name] = true;
  saveState(); render();
}

let activeTab = 'dash';
function showTab(t) {
  activeTab = t;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('on'));
  document.getElementById('page-'+t).classList.add('on');
  document.querySelectorAll('.nav-tab')[['dash','cal','results','groups'].indexOf(t)].classList.add('on');
  render();
}

function render() {
  if (activeTab === 'dash')    renderDash();
  else if (activeTab === 'cal')     renderCal();
  else if (activeTab === 'results') renderResults();
  else if (activeTab === 'groups')  renderGroups();
}

/* ─────────────────────────────────────────────
   INIT
───────────────────────────────────────────── */
loadState();
setStatus(`Embedded schedule · ${EMBEDDED.length} matches · hit Refresh for latest results`);
render();
doRefresh();
</script>
</body>
</html>
