<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 World Cup · Family Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green:#1a7a4a; --green-l:#e6f4ec; --green-d:#0f4f2f;
  --gold:#c9a84c;  --gold-l:#fdf6e3;
  --red:#c0392b;   --red-l:#fdecea;
  --ink:#1a1a1a;   --ink-2:#444;  --ink-3:#888;  --ink-4:#bbb;
  --border:#e0e0e0; --bg:#f7f6f2; --card:#ffffff;
  --radius:10px; --radius-sm:7px;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 4px 12px rgba(0,0,0,.05);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── MODAL OVERLAY ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem;backdrop-filter:blur(3px)}
.modal-overlay.hidden{display:none}
.modal{background:var(--card);border-radius:14px;padding:2rem;max-width:500px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2);max-height:90vh;overflow-y:auto}
.modal h2{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:.05em;margin-bottom:.25rem}
.modal h2 span{color:var(--gold)}
.modal-sub{font-size:13px;color:var(--ink-3);margin-bottom:1.5rem;line-height:1.5}
.field-label{font-size:12px;font-weight:600;color:var(--ink-2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;display:block}
.member-inputs{display:flex;flex-direction:column;gap:8px;margin-bottom:1.25rem}
.member-row{display:flex;gap:8px;align-items:center}
.member-row input{flex:1;font-size:14px;height:38px;padding:0 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif}
.member-row input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--green-l)}
.remove-btn{width:32px;height:32px;border:1px solid var(--border);border-radius:6px;background:none;cursor:pointer;color:var(--ink-3);font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.remove-btn:hover{border-color:var(--red);color:var(--red)}
.add-member-btn{font-size:13px;color:var(--green);background:none;border:1px dashed var(--green);border-radius:var(--radius-sm);padding:7px 14px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;margin-bottom:1.25rem}
.add-member-btn:hover{background:var(--green-l)}
.seed-row{display:flex;gap:8px;align-items:center;margin-bottom:1.5rem}
.seed-input{font-family:'DM Mono',monospace;font-size:14px;height:38px;padding:0 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--ink);width:120px}
.seed-input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--green-l)}
.seed-hint{font-size:12px;color:var(--ink-3);line-height:1.4;flex:1}
.dice-btn{width:38px;height:38px;border:1px solid var(--border);border-radius:var(--radius-sm);background:none;cursor:pointer;font-size:18px;transition:all .15s;flex-shrink:0}
.dice-btn:hover{background:var(--bg);border-color:var(--ink-3)}
.primary-btn{width:100%;height:44px;background:var(--green);color:#fff;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:.02em;transition:background .15s}
.primary-btn:hover{background:var(--green-d)}
.primary-btn:disabled{opacity:.5;cursor:not-allowed}

/* ── HEADER ── */
.site-header{background:var(--ink);color:#fff;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:100;gap:12px}
.site-header h1{font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:.06em;white-space:nowrap;flex-shrink:0}
.site-header h1 span{color:var(--gold)}
.header-right{display:flex;align-items:center;gap:8px;min-width:0}
#data-src{font-size:11px;color:#aaa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:240px}
.hdr-btn{background:none;border:1px solid #444;border-radius:6px;color:#ccc;font-size:12px;padding:5px 10px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:border-color .15s,color .15s;flex-shrink:0}
.hdr-btn:hover{border-color:var(--gold);color:var(--gold)}

/* ── NAV ── */
.nav-bar{background:var(--card);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none;position:sticky;top:54px;z-index:99}
.nav-bar::-webkit-scrollbar{display:none}
.nav-tab{padding:11px 18px;font-size:13px;font-weight:500;background:none;border:none;cursor:pointer;color:var(--ink-3);border-bottom:2px solid transparent;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:color .15s}
.nav-tab.on{color:var(--ink);border-bottom-color:var(--green)}
.nav-tab:hover:not(.on){color:var(--ink-2)}

/* ── PAGES ── */
.page{display:none;padding:1.5rem;max-width:1120px;margin:0 auto}
.page.on{display:block}

/* ── SHARE BANNER ── */
.share-banner{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.share-seed{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:var(--ink);letter-spacing:.05em}
.share-label{font-size:12px;color:var(--ink-3);margin-bottom:2px}
.share-url{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink-2);background:var(--bg);padding:5px 9px;border-radius:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:320px;cursor:pointer;border:1px solid var(--border);transition:border-color .15s}
.share-url:hover{border-color:var(--green)}
.copy-btn{font-size:12px;padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:none;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--ink-2);transition:all .15s;white-space:nowrap}
.copy-btn:hover{background:var(--green-l);border-color:var(--green);color:var(--green-d)}
.copy-btn.copied{background:var(--green-l);border-color:var(--green);color:var(--green-d)}

/* ── METRICS ── */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
.metric{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;text-align:center}
.metric-val{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--ink);line-height:1}
.metric-lbl{font-size:11px;color:var(--ink-3);margin-top:4px;text-transform:uppercase;letter-spacing:.05em}

/* ── TIER LEGEND ── */
.tier-legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.25rem}
.t-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap}
.t1{background:#ede9fe;color:#4c1d95}.t2{background:#dcfce7;color:#14532d}
.t3{background:#fff7ed;color:#7c2d12}.t4{background:#fef2f2;color:#7f1d1d}

/* ── MEMBER CARDS ── */
.member-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:14px}
.member-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.member-card-header{padding:.9rem 1.1rem;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.member-name{font-size:15px;font-weight:600}
.member-stat{font-size:12px;color:var(--ink-3);margin-top:2px}
.progress-bar{height:4px;border-radius:2px;background:var(--border);margin-top:6px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .5s ease}
.team-list{padding:.6rem .8rem;display:flex;flex-direction:column;gap:4px}
.team-row{display:flex;align-items:center;gap:7px;padding:5px 7px;border-radius:7px;background:var(--bg)}
.team-row.out{opacity:.32}
.team-row.out .team-name{text-decoration:line-through}
.team-flag{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.team-name{font-size:12px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-in{background:var(--green)}.dot-out{background:var(--red)}.dot-tbd{background:var(--ink-4)}

/* ── STATUS NOTICE ── */
.status-note{font-size:12px;color:var(--ink-3);font-style:italic;padding:.5rem .8rem;background:var(--gold-l);border-radius:6px;margin-top:6px}

/* ── CALENDAR ── */
.cal-toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1.25rem;align-items:center}
.cal-toolbar select{font-size:13px;font-family:'DM Sans',sans-serif;height:34px;padding:0 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--card);color:var(--ink);cursor:pointer}
.cal-toolbar label{display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;height:34px;padding:0 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--card)}

.day-block{margin-bottom:1.5rem}
.day-heading{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:.06em;color:var(--ink-2);margin-bottom:8px;display:flex;align-items:center;gap:8px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.today-pill{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;background:var(--green);color:#fff;padding:2px 8px;border-radius:20px}
.played-count{font-size:11px;color:var(--ink-3);font-family:'DM Sans',sans-serif;font-weight:400;margin-left:auto}

.match-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:5px;box-shadow:var(--shadow)}
.match-row.my-match{border-left:3px solid var(--green)}
.match-time{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink-3);min-width:38px;flex-shrink:0}
.match-side{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
.match-side.right{justify-content:flex-end}
.match-team-name{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px}
.match-team-name.out{opacity:.4;text-decoration:line-through}
.match-score{font-family:'Bebas Neue',sans-serif;font-size:18px;min-width:46px;text-align:center;color:var(--ink);flex-shrink:0}
.match-score.tbd{font-family:'DM Sans',sans-serif;font-size:12px;color:var(--ink-3);font-weight:400}
.match-venue{font-size:11px;color:var(--ink-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
.round-pill{font-size:10px;padding:2px 7px;border-radius:20px;background:var(--bg);color:var(--ink-3);white-space:nowrap;flex-shrink:0}
.owner-chip{font-size:10px;padding:1px 6px;border-radius:20px;font-weight:600;flex-shrink:0;white-space:nowrap}

/* ── RESULTS ── */
.results-intro{font-size:13px;color:var(--ink-3);margin-bottom:1.25rem}
.results-intro a{color:var(--green);text-decoration:none}
.results-intro a:hover{text-decoration:underline}
.round-heading{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:.05em;color:var(--ink-2);margin:1.25rem 0 7px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.result-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:5px;box-shadow:var(--shadow)}

/* ── GROUPS ── */
.groups-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
.group-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.group-title{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:.08em;padding:.55rem 1rem;background:var(--ink);color:var(--gold)}
.group-team{display:flex;align-items:center;gap:7px;padding:7px 10px;border-bottom:1px solid var(--border)}
.group-team:last-child{border-bottom:none}
.group-team.out{opacity:.32}
.group-team.out .g-name{text-decoration:line-through}
.g-flag{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.g-name{font-size:12px;flex:1}

/* ── EMPTY ── */
.empty{text-align:center;padding:3rem 1rem;color:var(--ink-3);font-size:14px;border:1px dashed var(--border);border-radius:var(--radius)}
.empty strong{display:block;font-size:17px;margin-bottom:6px;color:var(--ink-2)}

/* ── SPIN ── */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin .7s linear infinite}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .metrics{grid-template-columns:repeat(2,1fr)}
  .match-venue{display:none}
  #data-src{display:none}
  .match-team-name{max-width:75px}
  .share-url{max-width:160px}
}
</style>
</head>
<body>

<!-- ══════════════ SETUP MODAL ══════════════ -->
<div class="modal-overlay" id="setup-modal">
  <div class="modal">
    <h2>⚽ World Cup <span>2026</span></h2>
    <p class="modal-sub">Set up your family tracker. Enter each person's name, then choose a seed number — anyone loading the same URL will see the same team allocations.</p>

    <label class="field-label">Family members (2–8)</label>
    <div class="member-inputs" id="member-inputs"></div>
    <button class="add-member-btn" id="add-member-btn" onclick="addMemberField()">+ Add member</button>

    <label class="field-label">Allocation seed</label>
    <div class="seed-row">
      <input class="seed-input" type="number" id="seed-input" min="1" max="999999" placeholder="e.g. 4721">
      <button class="dice-btn" onclick="randomSeed()" title="Generate random seed">🎲</button>
      <span class="seed-hint">Same seed = same teams every time. Share the URL and everyone gets the same draw.</span>
    </div>

    <button class="primary-btn" id="setup-go-btn" onclick="setupGo()">Create tracker →</button>
  </div>
</div>

<!-- ══════════════ MAIN APP ══════════════ -->
<header class="site-header">
  <h1>⚽ WC <span>2026</span></h1>
  <div class="header-right">
    <span id="data-src"></span>
    <button class="hdr-btn" onclick="doRefresh()"><span id="ref-icon">↻</span> Refresh</button>
    <button class="hdr-btn" onclick="openSetup()">⚙ Setup</button>
  </div>
</header>

<nav class="nav-bar" id="nav-bar">
  <button class="nav-tab on" onclick="showTab('dash')">Dashboard</button>
  <button class="nav-tab" onclick="showTab('cal')">Calendar</button>
  <button class="nav-tab" onclick="showTab('results')">Results</button>
  <button class="nav-tab" onclick="showTab('groups')">Groups</button>
</nav>

<div id="page-dash"    class="page on"></div>
<div id="page-cal"     class="page"></div>
<div id="page-results" class="page"></div>
<div id="page-groups"  class="page"></div>

<script>
/* ══════════════════════════════════════════════════

/* ══════════════════════════════════════════════════
   SEEDED PRNG  (mulberry32)
══════════════════════════════════════════════════ */
function makePRNG(seed) {
  let s = seed >>> 0;
  return function() {
    s += 0x6D2B79F5;
    let t = s;
    t = Math.imul(t ^ t>>>15, t|1);
    t ^= t + Math.imul(t ^ t>>>7, t|61);
    return ((t ^ t>>>14) >>> 0) / 4294967296;
  };
}

function seededShuffle(arr, rng) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(rng() * (i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

/* ══════════════════════════════════════════════════
   ALLOCATION
══════════════════════════════════════════════════ */
function allocate(members, seed) {
  const rng = makePRNG(seed);
  const pools = {};
  [1,2,3,4].forEach(t => {
    pools[t] = seededShuffle(ALL_TEAMS.filter(x=>x.tier===t).map(x=>x.name), rng);
  });
  const alloc = {};
  members.forEach(m => alloc[m] = []);
  [1,2,3,4].forEach(t => {
    pools[t].forEach((name,i) => alloc[members[i % members.length]].push(name));
  });
  return alloc;
}

  const p = new URLSearchParams(h);
  const names = (p.get('names')||'').split(',').map(s=>s.trim()).filter(Boolean);
  const seed  = parseInt(p.get('seed')||'0',10);
  if (names.length >= 2 && seed > 0) return {members:names, seed};

  updateHash();

  render();

  p.set('seed',  CFG.seed);
  history.replaceState(null,'','#'+p.toString());
}

/* ══════════════════════════════════════════════════
   KNOCKOUT LOGIC  (derived from match data)
══════════════════════════════════════════════════ */
const KO_ROUNDS = ['Round of 32','Round of 16','Quarter-final','Semi-final','Final','Match for third place'];

// A team is a known real team name (not a placeholder like "1A", "W73")
function isRealTeam(name) {
  return ALL_TEAMS.some(t => t.name === name);
}

// Build the set of knocked-out teams from match results
function computeKnockedOut() {
  const out = new Set();

  // Knockout rounds: loser of any scored match is out
  MATCHES.filter(m => KO_ROUNDS.includes(m.r) && m.s1 !== undefined && isRealTeam(m.a) && isRealTeam(m.b))
    .forEach(m => {
      if (m.s1 > m.s2) out.add(m.b);
      else if (m.s2 > m.s1) out.add(m.a);
      // draws shouldn't happen in KO but if they do, leave both in for now
    });

  // Group stage: once all 3 matchdays for a group are complete AND the Round of 32
  // slots for that group are filled with real team names, teams not appearing are out.
  // We detect advancement by scanning R32 fixtures for real team names.
  const advanced = new Set();
  MATCHES.filter(m => m.r === 'Round of 32' && isRealTeam(m.a)).forEach(m => advanced.add(m.a));
  MATCHES.filter(m => m.r === 'Round of 32' && isRealTeam(m.b)).forEach(m => advanced.add(m.b));

  if (advanced.size > 0) {
    // For each group where at least one R32 slot is resolved, check which teams didn't advance
    const groupTeams = {};
    ALL_TEAMS.forEach(t => { if (!groupTeams[t.group]) groupTeams[t.group] = []; groupTeams[t.group].push(t.name); });

    // A group is "resolved" if all 3 matchdays are played (6 matches all scored)
    const groupMatchdays = {};
    MATCHES.filter(m => m.g).forEach(m => {
      if (!groupMatchdays[m.g]) groupMatchdays[m.g] = 0;
      if (m.s1 !== undefined) groupMatchdays[m.g]++;
    });

    Object.entries(groupTeams).forEach(([g, teams]) => {
      const played = groupMatchdays[g] || 0;
      if (played < 6) return; // group not complete yet
      teams.forEach(name => { if (!advanced.has(name)) out.add(name); });
    });
  }

  return out;
}

function getTeam(n)  { return ALL_TEAMS.find(t=>t.name===n); }
function getOwner(n) { for(const m of CFG.members){ if(ALLOC[m]&&ALLOC[m].includes(n)) return m; } return null; }

function ownerChip(name) {
  const owner = getOwner(name);
  if (!owner) return '';
  const idx = CFG.members.indexOf(owner);
  const c = memberColor(idx);
  return `<span class="owner-chip" style="background:${c.bg};color:${c.chip}">${owner.substring(0,3)}</span>`;
}

/* ══════════════════════════════════════════════════
   REFRESH  (openfootball via jsdelivr CDN)
══════════════════════════════════════════════════ */
async function doRefresh() {
  const ic = document.getElementById('ref-icon');
  ic.className='spin';
  try {
    const r = await fetch('https://cdn.jsdelivr.net/gh/openfootball/worldcup.json@master/2026/worldcup.json',{cache:'no-cache'});
    if (!r.ok) throw new Error('HTTP '+r.status);
    const d = await r.json();
    MATCHES = d.matches.map(m=>({
      r:m.round, d:m.date, t:(m.time||'').substring(0,5),
      a:norm(m.team1), b:norm(m.team2),
      g:(m.group||'').replace('Group ',''),
      v:m.ground||'',
      ...(m.score && m.score.ft ? {
        s1: m.score.et ? m.score.et[0] : m.score.ft[0],
        s2: m.score.et ? m.score.et[1] : m.score.ft[1],
        ...(m.score.p ? { p1: m.score.p[0], p2: m.score.p[1] } : {})
      } : {})
    }));
    const scored = MATCHES.filter(m=>m.s1!==undefined).length;
    setStatus(`openfootball · ${MATCHES.length} matches · ${scored} results · ${new Date().toLocaleTimeString()}`);
  } catch(e) {
    setStatus(`Embedded schedule · ${EMBEDDED.length} matches · refresh failed`);
  }
  ic.className='';
  render();
}

function setStatus(msg){ const el=document.getElementById('data-src'); if(el) el.textContent=msg; }

function addMemberField(value='') {
  if (modalMemberCount >= 8) return;
  modalMemberCount++;
  const div = document.createElement('div');
  div.className = 'member-row';
  div.innerHTML = `<input type="text" placeholder="Name ${modalMemberCount}" value="${value}" maxlength="20">
    <button class="remove-btn" onclick="removeMemberField(this)" title="Remove">✕</button>`;
  document.getElementById('member-inputs').appendChild(div);
  updateAddBtn();
}

function removeMemberField(btn) {
  if (modalMemberCount <= 2) return;
  btn.closest('.member-row').remove();
  modalMemberCount--;
  updateAddBtn();
}

function updateAddBtn() {
  document.getElementById('add-member-btn').style.display = modalMemberCount >= 8 ? 'none' : '';
}

function randomSeed() {
  document.getElementById('seed-input').value = Math.floor(Math.random()*900000)+100000;
}

function setupGo() {
  const inputs = [...document.querySelectorAll('#member-inputs input')];
  const names = inputs.map(i=>i.value.trim()).filter(Boolean);
  if (names.length < 2) { alert('Please enter at least 2 names.'); return; }
  const seed = parseInt(document.getElementById('seed-input').value, 10);
  if (!seed || seed < 1) { alert('Please enter a seed number (or roll the dice).'); return; }
  applyConfig({members: names, seed});
}

  let h = `<div class="share-banner">
    <div>
      <div class="share-label">Seed</div>
      <div class="share-seed">${CFG.seed}</div>
    </div>
    <div style="flex:1;min-width:0">
      <div class="share-label">Share this URL — anyone loading it gets the same draw</div>
      <div class="share-url" onclick="copyURL(this)" title="Click to copy">${url}</div>
    </div>
    <button class="copy-btn" id="copy-btn" onclick="copyURL(document.querySelector('.share-url'))">Copy link</button>
  </div>`;

  h += `<div class="metrics">
    <div class="metric"><div class="metric-val">${allAlive}</div><div class="metric-lbl">Teams still in</div></div>
    <div class="metric"><div class="metric-val">${ALL_TEAMS.length-allAlive}</div><div class="metric-lbl">Eliminated</div></div>
    <div class="metric"><div class="metric-val">${scored}</div><div class="metric-lbl">Matches played</div></div>
    <div class="metric"><div class="metric-val">${104-scored}</div><div class="metric-lbl">To go</div></div>
  </div>
  <div class="tier-legend">
    <span class="t-badge t1">Tier 1 · Elite</span>
    <span class="t-badge t2">Tier 2 · Strong</span>
    <span class="t-badge t3">Tier 3 · Competitive</span>
    <span class="t-badge t4">Tier 4 · Underdog</span>
  </div>`;

  // Group stage status note
  if (groupsPending > 0 && groupsDone > 0) {
    h += `<p class="status-note" style="margin-bottom:1rem">⏳ Group stage in progress — eliminations shown once all 6 matches in a group are complete and Round of 32 teams are confirmed.</p>`;
  } else if (groupsDone === 0) {
    h += `<p class="status-note" style="margin-bottom:1rem">🗓 Tournament hasn't started yet. Eliminations will update automatically as results come in — just hit Refresh.</p>`;
  }

  h += `<div class="member-grid">`;
  CFG.members.forEach((m, idx) => {
    const c = memberColor(idx);
    const teams = ALLOC[m] || [];
    const alive = teams.filter(t=>!out.has(t)).length;
    const total = teams.length;
    const pct = total ? Math.round((alive/total)*100) : 0;

    h += `<div class="member-card">
      <div class="member-card-header">
        <div class="avatar" style="background:${c.bg};color:${c.chip}">${memberInitials(m)}</div>
        <div style="flex:1">
          <div class="member-name">${m}</div>
          <div class="member-stat">${alive} of ${total} teams remaining · ${pct}%</div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${c.chip}"></div></div>
        </div>
      </div>
      <div class="team-list">`;

    teams.forEach(tn => {
      const t = getTeam(tn); if (!t) return;
      const isOut = out.has(tn);
      // Group stage: team may be "status unknown" (group not complete yet)
      const grpMatches = MATCHES.filter(m=>m.g===t.group && m.s1!==undefined).length;
      const grpPending = grpMatches < 6;
      const dotClass = isOut ? 'dot-out' : (grpPending && grpMatches > 0 ? 'dot-tbd' : 'dot-in');

      h += `<div class="team-row${isOut?' out':''}">
        <span class="team-flag">${t.flag}</span>
        <span class="team-name">${t.name}</span>
        <span class="t-badge t${t.tier}" style="font-size:10px">T${t.tier}</span>
        <span class="sdot ${dotClass}" title="${isOut?'Eliminated':(grpPending&&grpMatches>0?'Group in progress':'Active')}"></span>
      </div>`;
    });

    h += `</div></div>`;
  });
  h += `</div>`;
  el.innerHTML = h;
}

function copyURL(el) {
  navigator.clipboard.writeText(shareURL()).then(() => {
    const btn = document.getElementById('copy-btn');
    if (btn) { btn.textContent='Copied!'; btn.classList.add('copied'); setTimeout(()=>{btn.textContent='Copy link';btn.classList.remove('copied');},2000); }
  }).catch(()=> { /* fallback */ });
}

/* ══════════════════════════════════════════════════
   RENDER: CALENDAR
══════════════════════════════════════════════════ */
let CAL_MEMBER='all', CAL_ROUND='all', CAL_SCORES=true;

function renderCal() {
  const el = document.getElementById('page-cal');
  const today = new Date().toISOString().slice(0,10);
  const out = computeKnockedOut();
  const myTeams = CAL_MEMBER!=='all' ? new Set(ALLOC[CAL_MEMBER]||[]) : null;
  const rounds = [...new Set(MATCHES.map(m=>m.r))];

  let visible = MATCHES.filter(m => {
    if (CAL_ROUND!=='all' && m.r!==CAL_ROUND) return false;
    if (!CAL_SCORES && m.s1!==undefined) return false;
    if (myTeams && !myTeams.has(m.a) && !myTeams.has(m.b)) return false;
    return true;
  });

  const byDay = {};
  visible.forEach(m=>{ if(!byDay[m.d]) byDay[m.d]=[]; byDay[m.d].push(m); });
  const days = Object.keys(byDay).sort();

  const memOpts = CFG.members.map(m=>`<option value="${m}"${CAL_MEMBER===m?'selected':''}>${m}</option>`).join('');
  const rndOpts = rounds.map(r=>`<option value="${r}"${CAL_ROUND===r?'selected':''}>${r}</option>`).join('');

  let h = `<div class="cal-toolbar">
    <select onchange="CAL_MEMBER=this.value;renderCal()">
      <option value="all"${CAL_MEMBER==='all'?'selected':''}>All players</option>${memOpts}
    </select>
    <select onchange="CAL_ROUND=this.value;renderCal()">
      <option value="all"${CAL_ROUND==='all'?'selected':''}>All rounds</option>${rndOpts}
    </select>
    <label><input type="checkbox" ${CAL_SCORES?'checked':''} onchange="CAL_SCORES=this.checked;renderCal()"> Show played</label>
  </div>`;

  if (!days.length) { h+=`<div class="empty"><strong>No matches</strong>Adjust the filters above.</div>`; el.innerHTML=h; return; }

  days.forEach(day => {
    const ms = byDay[day].sort((a,b)=>a.t.localeCompare(b.t));
    const isToday = day===today;
    const isPast  = day<today;
    const label   = new Date(day+'T12:00:00').toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long'});
    const playedCount = ms.filter(m=>m.s1!==undefined).length;

    h += `<div class="day-block">
      <div class="day-heading">
        ${label}
        ${isToday?'<span class="today-pill">TODAY</span>':''}
        ${isPast&&!isToday?`<span class="played-count">${playedCount}/${ms.length} played</span>`:''}
      </div>`;

    ms.forEach(m => {
      const scored = m.s1!==undefined;
      const t1=getTeam(m.a), t2=getTeam(m.b);
      const o1=getOwner(m.a), o2=getOwner(m.b);
      const isMyMatch = myTeams&&(myTeams.has(m.a)||myTeams.has(m.b));
      const ko1=out.has(m.a), ko2=out.has(m.b);

      h += `<div class="match-row${scored?' scored':''}${isMyMatch?' my-match':''}">
        <span class="match-time">${m.t}</span>
        <div class="match-side">
          <span style="font-size:16px">${t1?t1.flag:''}</span>
          <span class="match-team-name${ko1?' out':''}">${m.a}</span>
          ${ownerChip(m.a)}
        </div>
        <div class="match-score${scored?'':' tbd'}">${scored?m.s1+'–'+m.s2:'vs'}</div>
        <div class="match-side right">
          ${ownerChip(m.b)}
          <span class="match-team-name${ko2?' out':''}">${m.b}</span>
          <span style="font-size:16px">${t2?t2.flag:''}</span>
        </div>
        <span class="match-venue">${m.v}</span>
        <span class="round-pill">${m.g?'Grp '+m.g:m.r.replace('Match for third place','3rd place')}</span>
      </div>`;
    });
    h += `</div>`;
  });

  el.innerHTML = h;
  if (today>=(MATCHES[0]?.d||'')) {
    const todayEl = el.querySelector('.today-pill');
    if (todayEl) setTimeout(()=>todayEl.closest('.day-block').scrollIntoView({behavior:'smooth',block:'start'}),80);
  }
}

/* ══════════════════════════════════════════════════
   RENDER: RESULTS
══════════════════════════════════════════════════ */
function renderResults() {
  const el = document.getElementById('page-results');
  const scored = MATCHES.filter(m=>m.s1!==undefined).sort((a,b)=>b.d.localeCompare(a.d)||b.t.localeCompare(a.t));

  let h = `<p class="results-intro">${scored.length} result${scored.length!==1?'s':''} · sourced from <a href="https://github.com/openfootball/worldcup.json" target="_blank">openfootball</a> · <a href="#" onclick="doRefresh();return false;">refresh now</a></p>`;

  if (!scored.length) {
    h += `<div class="empty"><strong>No results yet</strong>The tournament kicks off 11 June 2026. Results appear here automatically — just hit Refresh.</div>`;
  } else {
    const byRound = {};
    scored.forEach(m=>{ if(!byRound[m.r]) byRound[m.r]=[]; byRound[m.r].push(m); });
    Object.entries(byRound).forEach(([round,ms])=>{
      h += `<div class="round-heading">${round}</div>`;
      ms.forEach(m=>{
        const t1=getTeam(m.a), t2=getTeam(m.b);
        h += `<div class="result-row">
          <div class="match-side" style="flex:1">
            <span style="font-size:15px">${t1?t1.flag:''}</span>
            <span class="match-team-name">${m.a}</span>
            ${ownerChip(m.a)}
          </div>
          <div class="match-score">${m.s1}–${m.s2}</div>
          <div class="match-side right" style="flex:1">
            ${ownerChip(m.b)}
            <span class="match-team-name">${m.b}</span>
            <span style="font-size:15px">${t2?t2.flag:''}</span>
          </div>
          <span class="match-venue">${m.d}</span>
        </div>`;
      });
    });
  }
  el.innerHTML = h;
}

/* ══════════════════════════════════════════════════
   RENDER: GROUPS
══════════════════════════════════════════════════ */
function renderGroups() {
  const el = document.getElementById('page-groups');
  const out = computeKnockedOut();
  const groups = ['A','B','C','D','E','F','G','H','I','J','K','L'];
  let h = `<div class="groups-grid">`;
  groups.forEach(g => {
    h += `<div class="group-card"><div class="group-title">Group ${g}</div>`;
    ALL_TEAMS.filter(t=>t.group===g).forEach(t=>{
      const owner=getOwner(t.name);
      const isOut=out.has(t.name);
      const idx=owner?CFG.members.indexOf(owner):-1;
      const c=idx>=0?memberColor(idx):null;
      h += `<div class="group-team${isOut?' out':''}">
        <span class="g-flag">${t.flag}</span>
        <span class="g-name">${t.name}</span>
        <span class="t-badge t${t.tier}" style="font-size:9px">T${t.tier}</span>
        ${c?`<span class="owner-chip" style="background:${c.bg};color:${c.chip}">${owner.substring(0,3)}</span>`:''}
      </div>`;
    });
    h += `</div>`;
  });
  h += `</div>`;
  el.innerHTML = h;
}

/* ══════════════════════════════════════════════════
   TAB ROUTING
══════════════════════════════════════════════════ */
let activeTab = 'dash';
function showTab(t) {
  activeTab = t;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('on'));
  document.getElementById('page-'+t).classList.add('on');
  document.querySelectorAll('.nav-tab')[['dash','cal','results','groups'].indexOf(t)].classList.add('on');
  render();
}

function render() {
  if (!CFG.members.length) return;
  if (activeTab==='dash')    renderDash();
  else if (activeTab==='cal')     renderCal();
  else if (activeTab==='results') renderResults();
  else if (activeTab==='groups')  renderGroups();
}

/* ══════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════ */
(function init() {
  // Populate modal with default names so it's ready
  ['','','',''].forEach(n => addMemberField(n));
  randomSeed();

  // Check URL hash first
  const fromURL = parseHash();
  if (fromURL) {
    applyConfig(fromURL);
    setStatus(`Embedded schedule · ${EMBEDDED.length} matches · hit Refresh for latest results`);
    doRefresh();
  } else {
    // Show setup modal — pre-fill with sensible defaults
    document.getElementById('member-inputs').querySelectorAll('input')[0] && null;
    setStatus('Configure your tracker to get started');
  }
})();
</script>
</body>
