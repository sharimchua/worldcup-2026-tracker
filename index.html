<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 World Cup · Family Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green:#1a7a4a; --green-l:#e6f4ec; --green-d:#0f4f2f;
  --gold:#c9a84c;  --gold-l:#fdf6e3;
  --red:#c0392b;   --red-l:#fdecea;
  --ink:#1a1a1a;   --ink-2:#444;  --ink-3:#888;  --ink-4:#bbb;
  --border:#e0e0e0; --bg:#f7f6f2; --card:#ffffff;
  --radius:10px; --radius-sm:7px;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 4px 12px rgba(0,0,0,.05);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── MODAL OVERLAY ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem;backdrop-filter:blur(3px)}
.modal-overlay.hidden{display:none}
.modal{background:var(--card);border-radius:14px;padding:2rem;max-width:500px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2);max-height:90vh;overflow-y:auto}
.modal h2{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:.05em;margin-bottom:.25rem}
.modal h2 span{color:var(--gold)}
.modal-sub{font-size:13px;color:var(--ink-3);margin-bottom:1.5rem;line-height:1.5}
.field-label{font-size:12px;font-weight:600;color:var(--ink-2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;display:block}
.member-inputs{display:flex;flex-direction:column;gap:8px;margin-bottom:1.25rem}
.member-row{display:flex;gap:8px;align-items:center}
.member-row input{flex:1;font-size:14px;height:38px;padding:0 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif}
.member-row input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--green-l)}
.remove-btn{width:32px;height:32px;border:1px solid var(--border);border-radius:6px;background:none;cursor:pointer;color:var(--ink-3);font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.remove-btn:hover{border-color:var(--red);color:var(--red)}
.add-member-btn{font-size:13px;color:var(--green);background:none;border:1px dashed var(--green);border-radius:var(--radius-sm);padding:7px 14px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;margin-bottom:1.25rem}
.add-member-btn:hover{background:var(--green-l)}
.seed-row{display:flex;gap:8px;align-items:center;margin-bottom:1.5rem}
.seed-input{font-family:'DM Mono',monospace;font-size:14px;height:38px;padding:0 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--ink);width:120px}
.seed-input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--green-l)}
.seed-hint{font-size:12px;color:var(--ink-3);line-height:1.4;flex:1}
.dice-btn{width:38px;height:38px;border:1px solid var(--border);border-radius:var(--radius-sm);background:none;cursor:pointer;font-size:18px;transition:all .15s;flex-shrink:0}
.dice-btn:hover{background:var(--bg);border-color:var(--ink-3)}
.primary-btn{width:100%;height:44px;background:var(--green);color:#fff;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:.02em;transition:background .15s}
.primary-btn:hover{background:var(--green-d)}
.primary-btn:disabled{opacity:.5;cursor:not-allowed}

/* ── HEADER ── */
.site-header{background:var(--ink);color:#fff;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:100;gap:12px}
.site-header h1{font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:.06em;white-space:nowrap;flex-shrink:0}
.site-header h1 span{color:var(--gold)}
.header-right{display:flex;align-items:center;gap:8px;min-width:0}
#data-src{font-size:11px;color:#aaa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:240px}
.hdr-btn{background:none;border:1px solid #444;border-radius:6px;color:#ccc;font-size:12px;padding:5px 10px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:border-color .15s,color .15s;flex-shrink:0}
.hdr-btn:hover{border-color:var(--gold);color:var(--gold)}

/* ── NAV ── */
.nav-bar{background:var(--card);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none;position:sticky;top:54px;z-index:99}
.nav-bar::-webkit-scrollbar{display:none}
.nav-tab{padding:11px 18px;font-size:13px;font-weight:500;background:none;border:none;cursor:pointer;color:var(--ink-3);border-bottom:2px solid transparent;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:color .15s}
.nav-tab.on{color:var(--ink);border-bottom-color:var(--green)}
.nav-tab:hover:not(.on){color:var(--ink-2)}

/* ── PAGES ── */
.page{display:none;padding:1.5rem;max-width:1120px;margin:0 auto}
.page.on{display:block}

/* ── SHARE BANNER ── */
.share-banner{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.share-seed{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:var(--ink);letter-spacing:.05em}
.share-label{font-size:12px;color:var(--ink-3);margin-bottom:2px}
.share-url{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink-2);background:var(--bg);padding:5px 9px;border-radius:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:320px;cursor:pointer;border:1px solid var(--border);transition:border-color .15s}
.share-url:hover{border-color:var(--green)}
.copy-btn{font-size:12px;padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:none;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--ink-2);transition:all .15s;white-space:nowrap}
.copy-btn:hover{background:var(--green-l);border-color:var(--green);color:var(--green-d)}
.copy-btn.copied{background:var(--green-l);border-color:var(--green);color:var(--green-d)}

/* ── METRICS ── */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem}
.metric{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem;text-align:center;box-shadow:var(--shadow);position:relative;overflow:hidden;transition:transform 0.2s ease}
.metric:hover{transform:translateY(-2px)}
.metric-val{font-family:'Bebas Neue',sans-serif;font-size:38px;color:var(--ink);line-height:1}
.metric-lbl{font-size:11px;color:var(--ink-3);margin-top:4px;text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.metric.m-alive { border-top: 4px solid #10b981; }
.metric.m-elim { border-top: 4px solid #f43f5e; }
.metric.m-played { border-top: 4px solid #6366f1; }
.metric.m-togo { border-top: 4px solid #f59e0b; }

/* ── MEMBER STANDINGS LEADERBOARD ── */
.leaderboard-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
  margin-bottom: 1.5rem;
  box-shadow: var(--shadow);
}
.leaderboard-card h3 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 0.05em;
  margin-bottom: 0.75rem;
  color: var(--ink);
  display: flex;
  align-items: center;
  gap: 8px;
}
.leaderboard-table-wrapper {
  overflow-x: auto;
}
.leaderboard-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.leaderboard-table th {
  text-align: left;
  padding: 8px 10px;
  color: var(--ink-3);
  font-weight: 600;
  border-bottom: 2px solid var(--border);
  text-transform: uppercase;
  font-size: 10px;
  letter-spacing: 0.05em;
}
.leaderboard-table td {
  padding: 10px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.leaderboard-table tr:last-child td {
  border-bottom: none;
}
.leaderboard-rank {
  font-weight: 700;
  width: 30px;
  color: var(--ink-2);
}
.leaderboard-member {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 600;
}
.leaderboard-avatar {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  font-size: 10px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
}
.leaderboard-pts {
  font-weight: 700;
  color: var(--green);
}
.leaderboard-gd {
  font-weight: 600;
}

/* ── TOURNAMENT INSIGHTS ── */
.insights-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 0.05em;
  margin: 2rem 0 0.75rem 0;
  color: var(--ink);
  display: flex;
  align-items: center;
  gap: 8px;
}
.insights-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 16px;
  margin-bottom: 2rem;
}
.insights-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
  box-shadow: var(--shadow);
}
.insights-card h4 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px;
  letter-spacing: 0.05em;
  margin-bottom: 0.75rem;
  color: var(--ink-2);
  border-bottom: 1px solid var(--border);
  padding-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.insights-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.insight-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 12px;
  padding: 4px 0;
}
.insight-team {
  display: flex;
  align-items: center;
  gap: 6px;
  font-weight: 500;
}
.insight-val {
  font-weight: 600;
  color: var(--ink);
  font-family: 'DM Mono', monospace;
}

.tier-legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.25rem}
.t-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap;flex-shrink:0}
.t1{background:#ede9fe;color:#4c1d95}.t2{background:#dcfce7;color:#14532d}
.t3{background:#fff7ed;color:#7c2d12}.t4{background:#fef2f2;color:#7f1d1d}

/* ── MEMBER CARDS ── */
.member-grid{display:grid;gap:16px}
.member-grid:not([class*="cols-"]){grid-template-columns:repeat(auto-fit,minmax(270px,1fr))}

.member-grid.cols-2{grid-template-columns:1fr}
@media (min-width:600px){.member-grid.cols-2{grid-template-columns:repeat(2,1fr)}}

.member-grid.cols-3{grid-template-columns:1fr}
@media (min-width:768px){.member-grid.cols-3{grid-template-columns:repeat(3,1fr)}}

.member-grid.cols-4{grid-template-columns:1fr}
@media (min-width:580px){.member-grid.cols-4{grid-template-columns:repeat(2,1fr)}}
@media (min-width:992px){.member-grid.cols-4{grid-template-columns:repeat(4,1fr)}}

.member-grid.cols-5,
.member-grid.cols-6,
.member-grid.cols-7,
.member-grid.cols-8{grid-template-columns:repeat(auto-fit,minmax(250px,1fr))}

.member-header-stats{display:flex;gap:8px;font-size:11px;color:var(--ink-3);margin-top:4px}
.member-header-badge{background:var(--bg);padding:1px 6px;border-radius:4px;border:1px solid var(--border)}
.team-row-stats{font-size:10px;color:var(--ink-3);margin-left:auto;margin-right:8px;background:rgba(0,0,0,0.03);padding:1px 5px;border-radius:4px;font-family:'DM Mono',monospace}
.member-scorers-box{background:var(--bg);border-top:1px solid var(--border);padding:8px 12px;font-size:11px;color:var(--ink-2)}
.member-scorers-title{font-weight:600;color:var(--ink-3);font-size:10px;text-transform:uppercase;margin-bottom:3px;display:flex;align-items:center;gap:4px}
.member-scorers-list{font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.member-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.member-card-header{padding:.9rem 1.1rem;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.member-name{font-size:15px;font-weight:600}
.member-stat{font-size:12px;color:var(--ink-3);margin-top:2px}
.progress-bar{height:4px;border-radius:2px;background:var(--border);margin-top:6px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .5s ease}
.team-list{padding:.6rem .8rem;display:flex;flex-direction:column;gap:4px}
.team-row{display:flex;align-items:center;gap:7px;padding:5px 7px;border-radius:7px;background:var(--bg)}
.team-row.out{opacity:.32}
.team-row.out .team-name{text-decoration:line-through}
.team-flag{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.team-name{font-size:12px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-in{background:var(--green)}.dot-out{background:var(--red)}.dot-tbd{background:var(--ink-4)}

/* ── STATUS NOTICE ── */
.status-note{font-size:12px;color:var(--ink-3);font-style:italic;padding:.5rem .8rem;background:var(--gold-l);border-radius:6px;margin-top:6px}

/* ── CALENDAR ── */
.cal-toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1.25rem;align-items:center}
.cal-toolbar select{font-size:13px;font-family:'DM Sans',sans-serif;height:34px;padding:0 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--card);color:var(--ink);cursor:pointer}
.cal-toolbar label{display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;height:34px;padding:0 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--card)}

.day-block{margin-bottom:1.5rem;scroll-margin-top:110px}
.day-heading{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:.06em;color:var(--ink-2);margin-bottom:8px;display:flex;align-items:center;gap:8px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.today-pill{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;background:var(--green);color:#fff;padding:2px 8px;border-radius:20px}
.played-count{font-size:11px;color:var(--ink-3);font-family:'DM Sans',sans-serif;font-weight:400;margin-left:auto}

.matches-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 14px;
  margin-top: 8px;
  margin-bottom: 8px;
}
.match-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1.15rem;
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  gap: 10px;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  position: relative;
}
.match-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}
.match-card.my-match {
  border-left: 4px solid var(--green);
}
.match-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px dashed var(--border);
  padding-bottom: 6px;
}
.round-badge {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--ink-3);
  background: var(--bg);
  padding: 2px 7px;
  border-radius: 12px;
}
.match-time-status {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  color: var(--ink-3);
}
.match-time-status.status-final {
  color: var(--green);
  font-weight: 600;
  background: var(--green-l);
  padding: 1px 5px;
  border-radius: 4px;
  font-family: 'DM Sans', sans-serif;
  font-size: 9px;
  letter-spacing: 0.05em;
}
.match-card-body {
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex: 1;
}
.team-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  min-height: 22px;
}
.team-info {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
}
.team-flag {
  font-size: 16px;
  width: 20px;
  text-align: center;
  flex-shrink: 0;
  display: inline-block;
}
.team-flag-placeholder {
  width: 20px;
  flex-shrink: 0;
  display: inline-block;
}
.team-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.team-name.out {
  opacity: 0.45;
  text-decoration: line-through;
  font-weight: 400;
}
.team-score-wrapper {
  display: flex;
  align-items: center;
  gap: 4px;
}
.team-score {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  color: var(--ink);
  min-width: 14px;
  text-align: right;
}
.pens-score {
  font-size: 11px;
  color: var(--ink-3);
  font-weight: normal;
}
.team-scorers {
  font-size: 10px;
  color: var(--ink-3);
  margin-left: 28px;
  margin-top: -5px;
  margin-bottom: 2px;
  line-height: 1.35;
  font-style: italic;
}
.match-card-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top: 1px solid var(--bg);
  padding-top: 6px;
  margin-top: auto;
}
.match-venue {
  font-size: 10px;
  color: var(--ink-3);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.match-date {
  font-size: 10px;
  color: var(--ink-3);
  white-space: nowrap;
}
.owner-chip{font-size:10px;padding:1px 6px;border-radius:20px;font-weight:600;flex-shrink:0;white-space:nowrap}

/* ── RESULTS ── */
.results-intro{font-size:13px;color:var(--ink-3);margin-bottom:1.25rem}
.results-intro a{color:var(--green);text-decoration:none}
.results-intro a:hover{text-decoration:underline}
.round-heading{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:.05em;color:var(--ink-2);margin:1.25rem 0 7px;padding-bottom:4px;border-bottom:1px solid var(--border)}

/* ── GROUPS ── */
.groups-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:12px}
.group-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.group-title{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:.08em;padding:.55rem 1rem;background:var(--ink);color:var(--gold)}
.group-table{width:100%;border-collapse:collapse;font-size:11px}
.group-table th{background:var(--bg);color:var(--ink-3);font-weight:600;text-transform:uppercase;font-size:9px;letter-spacing:.05em;padding:5px 6px;text-align:left;border-bottom:1px solid var(--border)}
.group-table th.num, .group-table td.num{text-align:center;padding:5px 4px}
.group-table td{padding:6px 6px;border-bottom:1px solid var(--border);vertical-align:middle}
.group-table tr:last-child td{border-bottom:none}
.group-table tr.out{opacity:.45}
.group-table tr.out .g-name{text-decoration:line-through}
.group-pos{font-weight:600;color:var(--ink-3);text-align:center;width:14px}
.group-team-cell{display:flex;align-items:center;gap:4px;min-width:0}
.g-flag{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.g-name{font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}

/* ── EMPTY ── */
.empty{text-align:center;padding:3rem 1rem;color:var(--ink-3);font-size:14px;border:1px dashed var(--border);border-radius:var(--radius)}
.empty strong{display:block;font-size:17px;margin-bottom:6px;color:var(--ink-2)}

/* ── SPIN ── */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin .7s linear infinite}

.hdr-select {
  background: #222;
  border: 1px solid #444;
  border-radius: 6px;
  color: #ccc;
  font-size: 12px;
  padding: 5px 10px;
  cursor: pointer;

function parseMatchDateTime(dateStr, timeStr, venue) {
  let timeOnly = "12:00";
  let offsetStr = "";

  if (timeStr) {
    const parts = timeStr.trim().split(/\s+/);
    timeOnly = parts[0];
    if (parts[1] && parts[1].startsWith('UTC')) {
      offsetStr = parts[1].substring(3);
    }
  }

  if (!offsetStr && venue) {
    const offset = VENUE_OFFSETS[venue];
    if (offset !== undefined) {
      const sign = offset >= 0 ? '+' : '-';
      offsetStr = sign + String(Math.abs(offset)).padStart(2, '0') + ':00';
    }
  } else if (offsetStr) {
    const sign = offsetStr.startsWith('-') ? '-' : '+';
    const val = offsetStr.replace(/^[+-]/, '');
    const num = Math.abs(parseInt(val, 10));
    offsetStr = sign + String(num).padStart(2, '0') + ':00';
  } else {
    offsetStr = 'Z';
  }

  if (timeOnly.length === 4 && timeOnly.includes(':')) {
    timeOnly = '0' + timeOnly;
  }

  return new Date(`${dateStr}T${timeOnly}:00${offsetStr}`);
}

function getMatchDateTimeInTimezone(m, tz) {
  if (tz === 'local-match') {
    const originalTime = (m.t || '').split(' ')[0] || '12:00';
    return { d: m.d, t: originalTime.substring(0, 5) };
  }
  
  const dateObj = parseMatchDateTime(m.d, m.t, m.v);
  
  try {
    const formatter = new Intl.DateTimeFormat('en-US', {
      timeZone: tz === 'device' ? undefined : tz,
      year: 'numeric',
      month: '2-digit',
      day: '2-digit',
      hour: '2-digit',
      minute: '2-digit',
      hour12: false
    });
    
    const parts = formatter.formatToParts(dateObj);
    let year, month, day, hour, minute;
    for (const part of parts) {
      if (part.type === 'year') year = part.value;
      if (part.type === 'month') month = part.value;
      if (part.type === 'day') day = part.value;
      if (part.type === 'hour') hour = part.value;
      if (part.type === 'minute') minute = part.value;
    }
    
    if (hour === '24') hour = '00';
    
    return {
      d: `${year}-${month}-${day}`,
      t: `${hour}:${minute}`
    };
  } catch (e) {
    console.error("Timezone formatting error, falling back to original", e);
    const originalTime = (m.t || '').split(' ')[0] || '12:00';
    return { d: m.d, t: originalTime.substring(0, 5) };
  }
}

function getTodayInTimezone(tz) {
  const options = { year: 'numeric', month: '2-digit', day: '2-digit' };
  if (tz !== 'device' && tz !== 'local-match') {
    options.timeZone = tz;
  }
  try {
    const formatter = new Intl.DateTimeFormat('en-US', options);
    const parts = formatter.formatToParts(new Date());
    let year, month, day;
    for (const part of parts) {
      if (part.type === 'year') year = part.value;
      if (part.type === 'month') month = part.value;
      if (part.type === 'day') day = part.value;
    }
    return `${year}-${month}-${day}`;
  } catch (e) {
    return new Date().toISOString().slice(0, 10);
  }
}

function changeTimezone(tz) {
  CAL_TZ = tz;
  localStorage.setItem('wc_timezone', tz);
  
  const sel = document.getElementById('tz-select');

  render();
}

/* ══════════════════════════════════════════════════
   SEEDED PRNG  (mulberry32)
══════════════════════════════════════════════════ */
function makePRNG(seed) {
  let s = seed >>> 0;
  return function() {
    s += 0x6D2B79F5;
    let t = s;
    t = Math.imul(t ^ t>>>15, t|1);
    t ^= t + Math.imul(t ^ t>>>7, t|61);
    return ((t ^ t>>>14) >>> 0) / 4294967296;
  };
}

function seededShuffle(arr, rng) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(rng() * (i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

/* ══════════════════════════════════════════════════
   ALLOCATION
══════════════════════════════════════════════════ */
function allocate(members, seed) {
  const rng = makePRNG(seed);
  const pools = {};
  [1,2,3,4].forEach(t => {
    pools[t] = seededShuffle(ALL_TEAMS.filter(x=>x.tier===t).map(x=>x.name), rng);
  });
  const alloc = {};
  members.forEach(m => alloc[m] = []);
  [1,2,3,4].forEach(t => {
    pools[t].forEach((name,i) => alloc[members[i % members.length]].push(name));
  });
  return alloc;
}

let CFG = { members: [], seed: 0 };

function parseHash() {
  const h = location.hash.slice(1);
  if (!h) return null;
  const p = new URLSearchParams(h);
  const names = (p.get('names')||'').split(',').map(s=>s.trim()).filter(Boolean);
  const seed  = parseInt(p.get('seed')||'0',10);
  if (names.length >= 2 && seed > 0) return {members:names, seed};
  return null;
}

function applyConfig(cfg) {
  CFG = cfg;
  ALLOC = allocate(cfg.members, cfg.seed);
  updateHash();
  document.getElementById('setup-modal').classList.add('hidden');
  render();
}

function updateHash() {
  const p = new URLSearchParams();
  p.set('names', CFG.members.join(','));
  p.set('seed',  CFG.seed);
  history.replaceState(null,'','#'+p.toString());
}

/* ══════════════════════════════════════════════════
   KNOCKOUT LOGIC  (derived from match data)
══════════════════════════════════════════════════ */
const KO_ROUNDS = ['Round of 32','Round of 16','Quarter-final','Semi-final','Final','Match for third place'];

// A team is a known real team name (not a placeholder like "1A", "W73")
function isRealTeam(name) {
  return ALL_TEAMS.some(t => t.name === name);
}

// Build the set of knocked-out teams from match results
function computeKnockedOut() {
  const out = new Set();

  // Knockout rounds: loser of any scored match is out (only if revealed)
  MATCHES.filter(m => KO_ROUNDS.includes(m.r) && m.s1 !== undefined && isMatchRevealed(m) && isRealTeam(m.a) && isRealTeam(m.b))
    .forEach(m => {
      if (m.s1 > m.s2) out.add(m.b);
      else if (m.s2 > m.s1) out.add(m.a);
    });

  // Group stage: once all 3 matchdays for a group are complete AND the Round of 32
  // slots for that group are filled with real team names, teams not appearing are out.
  // We detect advancement by scanning R32 fixtures for real team names.
  const advanced = new Set();
  MATCHES.filter(m => m.r === 'Round of 32' && isRealTeam(m.a)).forEach(m => advanced.add(m.a));
  MATCHES.filter(m => m.r === 'Round of 32' && isRealTeam(m.b)).forEach(m => advanced.add(m.b));

  if (advanced.size > 0) {
    const groupTeams = {};
    ALL_TEAMS.forEach(t => { if (!groupTeams[t.group]) groupTeams[t.group] = []; groupTeams[t.group].push(t.name); });

    // A group is "resolved" if all 3 matchdays are played and revealed
    const groupMatchdays = {};
    MATCHES.filter(m => m.g).forEach(m => {
      if (!groupMatchdays[m.g]) groupMatchdays[m.g] = 0;
      if (m.s1 !== undefined && isMatchRevealed(m)) groupMatchdays[m.g]++;
    });

    const standings = computeStandings();
    const allThirdPlaceMapped = !MATCHES.some(m => m.r === 'Round of 32' && (String(m.a).startsWith('3') || String(m.b).startsWith('3')));

    Object.entries(groupTeams).forEach(([g, teams]) => {
      const played = groupMatchdays[g] || 0;
      if (played < 6) return; // group not complete or not fully revealed yet
      
      // Do not eliminate teams until we see at least 2 from this group advance
      const advancers = teams.filter(name => advanced.has(name));
      if (advancers.length < 2) return;

      const groupStandings = teams.map(t => standings[t]);
      groupStandings.sort((a, b) => {
        if (b.pts !== a.pts) return b.pts - a.pts;
        if (b.gd !== a.gd) return b.gd - a.gd;
        if (b.gf !== a.gf) return b.gf - a.gf;
        return a.name.localeCompare(b.name);
      });

      // 4th place is always out
      out.add(groupStandings[3].name);

      // 3rd place is out only if they haven't advanced and all 3rd place slots are filled
      const thirdPlace = groupStandings[2].name;
      if (!advanced.has(thirdPlace) && allThirdPlaceMapped) {
        out.add(thirdPlace);
      }
    });
  }

  return out;
}

/* ══════════════════════════════════════════════════
   STATS COMPILATION (GF, GA, W-D-L, Scorers)
══════════════════════════════════════════════════ */
function compileStats() {
  const teamStats = {};
  ALL_TEAMS.forEach(t => {
    teamStats[t.name] = {
      name: t.name,
      flag: t.flag,
      tier: t.tier,
      group: t.group,
      wins: 0,
      draws: 0,
      losses: 0,
      played: 0,
      gf: 0,
      ga: 0,
      gd: 0,
      scorers: {}
    };
  });

  const out = computeKnockedOut();
  let unrevealedCount = 0;

  MATCHES.forEach(m => {
    if (m.s1 === undefined || m.s2 === undefined) return; // not played yet

    if (!isMatchRevealed(m)) {
      unrevealedCount++;
      return;
    }

    const t1 = m.a;
    const t2 = m.b;

    if (teamStats[t1]) {
      teamStats[t1].played++;
      teamStats[t1].gf += m.s1;
      teamStats[t1].ga += m.s2;
      if (m.goals1) {
        m.goals1.forEach(g => {
          if (g && g.name) {
            teamStats[t1].scorers[g.name] = (teamStats[t1].scorers[g.name] || 0) + 1;
          }
        });
      }
    }

    if (teamStats[t2]) {
      teamStats[t2].played++;
      teamStats[t2].gf += m.s2;
      teamStats[t2].ga += m.s1;
      if (m.goals2) {
        m.goals2.forEach(g => {
          if (g && g.name) {
            teamStats[t2].scorers[g.name] = (teamStats[t2].scorers[g.name] || 0) + 1;
          }
        });
      }
    }

    let w1 = false, w2 = false, d = false;
    if (m.s1 > m.s2) {
      w1 = true;
    } else if (m.s2 > m.s1) {
      w2 = true;
    } else {
      if (m.p1 !== undefined && m.p2 !== undefined) {
        if (m.p1 > m.p2) w1 = true;
        else w2 = true;
      } else {
        d = true;
      }
    }

    if (w1) {
      if (teamStats[t1]) teamStats[t1].wins++;
      if (teamStats[t2]) teamStats[t2].losses++;
    } else if (w2) {
      if (teamStats[t1]) teamStats[t1].losses++;
      if (teamStats[t2]) teamStats[t2].wins++;
    } else if (d) {
      if (teamStats[t1]) teamStats[t1].draws++;
      if (teamStats[t2]) teamStats[t2].draws++;
    }
  });

  ALL_TEAMS.forEach(t => {
    if (teamStats[t.name]) {
      teamStats[t.name].gd = teamStats[t.name].gf - teamStats[t.name].ga;
    }
  });

  const memberStats = {};
  CFG.members.forEach(m => {
    memberStats[m] = {
      name: m,
      teamsAlive: 0,
      totalTeams: 0,
      wins: 0,
      draws: 0,
      losses: 0,
      played: 0,
      gf: 0,
      ga: 0,
      gd: 0,
      pts: 0,
      scorers: {}
    };
  });

  CFG.members.forEach(m => {
    const teams = ALLOC[m] || [];
    const stats = memberStats[m];
    stats.totalTeams = teams.length;

    teams.forEach(tn => {
      if (!out.has(tn)) {
        stats.teamsAlive++;
      }
      const ts = teamStats[tn];
      if (ts) {
        stats.wins += ts.wins;
        stats.draws += ts.draws;
        stats.losses += ts.losses;
        stats.played += ts.played;
        stats.gf += ts.gf;
        stats.ga += ts.ga;
        stats.pts += (ts.wins * 3) + (ts.draws * 1);
        
        Object.entries(ts.scorers).forEach(([pName, count]) => {
          stats.scorers[pName] = (stats.scorers[pName] || 0) + count;
        });
      }
    });
    stats.gd = stats.gf - stats.ga;
  });

  return { teamStats, memberStats, unrevealedCount };
}

/* ══════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════ */
function getTeam(n)  { return ALL_TEAMS.find(t=>t.name===n); }
function getOwner(n) { for(const m of CFG.members){ if(ALLOC[m]&&ALLOC[m].includes(n)) return m; } return null; }

function ownerChip(name) {
  const owner = getOwner(name);
  if (!owner) return '';
  const idx = CFG.members.indexOf(owner);
  const c = memberColor(idx);
  return `<span class="owner-chip" style="background:${c.bg};color:${c.chip}">${owner.substring(0,3)}</span>`;
}

/* ══════════════════════════════════════════════════
   REFRESH  (openfootball via jsdelivr CDN)
══════════════════════════════════════════════════ */
async function doRefresh() {
  const ic = document.getElementById('ref-icon');
  ic.className='spin';
  try {
    const r = await fetch('https://cdn.jsdelivr.net/gh/openfootball/worldcup.json@master/2026/worldcup.json',{cache:'no-cache'});
    if (!r.ok) throw new Error('HTTP '+r.status);
    const d = await r.json();
    MATCHES = d.matches.map(m=>({
      r:m.round, d:m.date, t:m.time||'',
      a:norm(m.team1), b:norm(m.team2),
      g:(m.group||'').replace('Group ',''),
      v:m.ground||'',
      goals1: m.goals1 || [],
      goals2: m.goals2 || [],
      status: m.score && m.score.ft ? (m.score.p ? 'PEN' : (m.score.et ? 'AET' : 'FT')) : null,
      ...(m.score && m.score.ft ? {
        s1: m.score.et ? m.score.et[0] : m.score.ft[0],
        s2: m.score.et ? m.score.et[1] : m.score.ft[1],
        ...(m.score.p ? { p1: m.score.p[0], p2: m.score.p[1] } : {})
      } : {})
    }));
    const scored = MATCHES.filter(m=>m.s1!==undefined).length;
    setStatus(`openfootball · ${MATCHES.length} matches · ${scored} results · ${new Date().toLocaleTimeString()}`);
  } catch(e) {
    setStatus(`Embedded schedule · ${EMBEDDED.length} matches · refresh failed`);
  }
  ic.className='';
  render();
}

function setStatus(msg){ const el=document.getElementById('data-src'); if(el) el.textContent=msg; }

/* ══════════════════════════════════════════════════
   SETUP MODAL
══════════════════════════════════════════════════ */
let modalMemberCount = 0;

function openSetup() {
  const modal = document.getElementById('setup-modal');
  modal.classList.remove('hidden');
  // Pre-fill with current config if exists
  const inputs = document.getElementById('member-inputs');
  inputs.innerHTML='';
  modalMemberCount = 0;
  const names = CFG.members.length ? CFG.members : ['','','',''];
  names.forEach(n => addMemberField(n));
  document.getElementById('seed-input').value = CFG.seed || '';
}

function addMemberField(value='') {
  if (modalMemberCount >= 8) return;
  modalMemberCount++;
  const div = document.createElement('div');
  div.className = 'member-row';
  div.innerHTML = `<input type="text" placeholder="Name ${modalMemberCount}" value="${value}" maxlength="20">
    <button class="remove-btn" onclick="removeMemberField(this)" title="Remove">✕</button>`;
  document.getElementById('member-inputs').appendChild(div);
  updateAddBtn();
}

function removeMemberField(btn) {
  if (modalMemberCount <= 2) return;
  btn.closest('.member-row').remove();
  modalMemberCount--;
  updateAddBtn();
}

function updateAddBtn() {
  document.getElementById('add-member-btn').style.display = modalMemberCount >= 8 ? 'none' : '';
}

function randomSeed() {
  document.getElementById('seed-input').value = Math.floor(Math.random()*900000)+100000;
}

function setupGo() {
  const inputs = [...document.querySelectorAll('#member-inputs input')];
  const names = inputs.map(i=>i.value.trim()).filter(Boolean);
  if (names.length < 2) { alert('Please enter at least 2 names.'); return; }
  const seed = parseInt(document.getElementById('seed-input').value, 10);
  if (!seed || seed < 1) { alert('Please enter a seed number (or roll the dice).'); return; }
  applyConfig({members: names, seed});
}

/* ══════════════════════════════════════════════════
   RENDER: DASHBOARD
══════════════════════════════════════════════════ */
function renderDash() {
  const el = document.getElementById('page-dash');
  if (!CFG.members.length) { el.innerHTML=''; return; }
  
  const { teamStats, memberStats, unrevealedCount } = compileStats();
  const out = computeKnockedOut();
  const allAlive = ALL_TEAMS.filter(t=>!out.has(t.name)).length;
  const scored   = MATCHES.filter(m=>m.s1!==undefined && isMatchRevealed(m)).length;
  const groupsDone = MATCHES.filter(m=>m.g&&m.s1!==undefined && isMatchRevealed(m)).length;
  const groupsPending = MATCHES.filter(m=>m.g&&(m.s1===undefined || !isMatchRevealed(m))).length;

  // Share banner
  const url = shareURL();
  let h = ``;

  if (unrevealedCount > 0) {
    h += `<div class="status-note" style="margin-bottom:1.5rem; background:var(--gold-l); border:1px solid var(--gold); padding:0.9rem 1.1rem; border-radius:var(--radius); display:flex; align-items:center; justify-content:space-between; gap:12px; font-style:normal; flex-wrap:wrap">
      <div style="display:flex; align-items:center; gap:8px">
        <span style="font-size:16px">⚠️</span>
        <span style="font-size:13px; font-weight:500; color:var(--ink)">
          <strong>Spoiler Protection:</strong> ${unrevealedCount} match results have been played but are currently hidden.
        </span>
      </div>
      <div style="display:flex; gap:8px">
        <button class="reveal-btn" onclick="revealAllScores()" style="padding:4px 10px; font-size:11px">👁️ Reveal All</button>
        <button class="spoilers-btn" onclick="showTab('cal')" style="padding:4px 10px; font-size:11px; height:auto; border-radius:4px">Go to Calendar</button>
      </div>
    </div>`;
  }

  h += `<div class="share-banner">
    <div>
      <div class="share-label">Seed</div>
      <div class="share-seed">${CFG.seed}</div>
    </div>
    <div style="flex:1;min-width:0">
      <div class="share-label">Share this URL — anyone loading it gets the same draw</div>
      <div class="share-url" onclick="copyURL(this)" title="Click to copy">${url}</div>
    </div>
    <button class="copy-btn" id="copy-btn" onclick="copyURL(document.querySelector('.share-url'))">Copy link</button>
  </div>`;

  h += `<div class="metrics">
    <div class="metric m-alive"><div class="metric-val">${allAlive}</div><div class="metric-lbl">Teams still in</div></div>
    <div class="metric m-elim"><div class="metric-val">${ALL_TEAMS.length-allAlive}</div><div class="metric-lbl">Eliminated</div></div>
    <div class="metric m-played"><div class="metric-val">${scored}</div><div class="metric-lbl">Matches played</div></div>
    <div class="metric m-togo"><div class="metric-val">${104-scored}</div><div class="metric-lbl">To go</div></div>
  </div>`;

  // Member Standings Leaderboard
  const sortedMembers = [...CFG.members].sort((a, b) => {
    const sa = memberStats[a];
    const sb = memberStats[b];
    if (sa.teamsAlive !== sb.teamsAlive) return sb.teamsAlive - sa.teamsAlive;
    if (sa.pts !== sb.pts) return sb.pts - sa.pts;
    if (sa.gd !== sb.gd) return sb.gd - sa.gd;
    return sb.gf - sa.gf;
  });

  h += `<div class="leaderboard-card">
    <h3>🏆 Member Standings</h3>
    <div class="leaderboard-table-wrapper">
      <table class="leaderboard-table">
        <thead>
          <tr>
            <th>Rank</th>
            <th>Member</th>
            <th style="text-align:center">Teams Remaining</th>
            <th style="text-align:center">Record (W-D-L)</th>
            <th style="text-align:center">Pts</th>
            <th style="text-align:center">GF</th>
            <th style="text-align:center">GD</th>
          </tr>
        </thead>
        <tbody>`;

  sortedMembers.forEach((m, idx) => {
    const stats = memberStats[m];
    const mIdx = CFG.members.indexOf(m);
    const c = memberColor(mIdx);
    const gdStyle = stats.gd > 0 ? 'color:#1a7a4a;font-weight:700' : (stats.gd < 0 ? 'color:#c0392b;font-weight:700' : 'color:var(--ink-2)');
    h += `<tr>
      <td class="leaderboard-rank">#${idx + 1}</td>
      <td>
        <div class="leaderboard-member">
          <div class="leaderboard-avatar" style="background:${c.bg};color:${c.chip}">${memberInitials(m)}</div>
          <span>${m}</span>
        </div>
      </td>
      <td style="text-align:center;font-weight:600">${stats.teamsAlive} <span style="color:var(--ink-3);font-weight:400;font-size:11px">/ ${stats.totalTeams}</span></td>
      <td style="text-align:center;color:var(--ink-2)">${stats.wins}-${stats.draws}-${stats.losses}</td>
      <td style="text-align:center" class="leaderboard-pts">${stats.pts}</td>
      <td style="text-align:center;color:var(--ink-2)">${stats.gf}</td>
      <td style="text-align:center;font-family:'DM Mono',monospace;${gdStyle}">${stats.gd > 0 ? '+' + stats.gd : stats.gd}</td>
    </tr>`;
  });
  h += `</tbody></table></div></div>`;

  h += `<div class="tier-legend">
    <span class="t-badge t1">Tier 1 · Elite</span>
    <span class="t-badge t2">Tier 2 · Strong</span>
    <span class="t-badge t3">Tier 3 · Competitive</span>
    <span class="t-badge t4">Tier 4 · Underdog</span>
  </div>`;

  // Group stage status note
  if (groupsPending > 0 && groupsDone > 0) {
    h += `<p class="status-note" style="margin-bottom:1rem">⏳ Group stage in progress — eliminations shown once all 6 matches in a group are complete and Round of 32 teams are confirmed.</p>`;
  } else if (groupsDone === 0) {
    h += `<p class="status-note" style="margin-bottom:1rem">🗓 Tournament hasn't started yet. Eliminations will update automatically as results come in — just hit Refresh.</p>`;
  }

  // Member Grid
  h += `<div class="member-grid cols-${CFG.members.length}">`;
  CFG.members.forEach((m, idx) => {
    const c = memberColor(idx);
    const teams = ALLOC[m] || [];
    const alive = teams.filter(t=>!out.has(t)).length;
    const total = teams.length;
    const pct = total ? Math.round((alive/total)*100) : 0;
    const stats = memberStats[m];

    h += `<div class="member-card">
      <div class="member-card-header" style="border-top: 4px solid ${c.chip}">
        <div class="avatar" style="background:${c.bg};color:${c.chip}">${memberInitials(m)}</div>
        <div style="flex:1;min-width:0">
          <div class="member-name">${m}</div>
          <div class="member-header-stats">
            <span class="member-header-badge">${stats.pts} pts</span>
            <span>${alive}/${total} alive</span>
            <span>${stats.wins}W-${stats.draws}D-${stats.losses}L</span>
          </div>
          <div class="progress-bar" style="margin-top:8px"><div class="progress-fill" style="width:${pct}%;background:${c.chip}"></div></div>
        </div>
      </div>
      <div class="team-list">`;

    teams.forEach(tn => {
      const t = getTeam(tn); if (!t) return;
      const isOut = out.has(tn);
      const grpMatches = MATCHES.filter(m=>m.g===t.group && m.s1!==undefined).length;
      const grpPending = grpMatches < 6;
      const dotClass = isOut ? 'dot-out' : (grpPending && grpMatches > 0 ? 'dot-tbd' : 'dot-in');
      const ts = teamStats[tn] || { wins: 0, draws: 0, losses: 0, gf: 0 };

      h += `<div class="team-row${isOut?' out':''}">
        <span class="team-flag">${t.flag}</span>
        <span class="team-name" title="${t.name}">${t.name}</span>
        <span class="team-row-stats">${ts.wins}W-${ts.draws}D-${ts.losses}L · ⚽${ts.gf}</span>
        <span class="t-badge t${t.tier}" style="font-size:10px;flex-shrink:0">T${t.tier}</span>
        <span class="sdot ${dotClass}" title="${isOut?'Eliminated':(grpPending&&grpMatches>0?'Group in progress':'Active')}"></span>
      </div>`;
    });

    h += `</div>`; // Close team-list

    // Scorers list for this member
    const mScorers = Object.entries(stats.scorers)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 3)
      .map(([name, count]) => `${name} (${count})`)
      .join(', ');

    h += `<div class="member-scorers-box">
      <div class="member-scorers-title">⭐ Top Scorers</div>
      <div class="member-scorers-list" title="${mScorers || 'No goals scored yet'}">
        ${mScorers || 'No goals scored yet'}
      </div>
    </div>`;

    h += `</div>`; // Close member-card
  });
  h += `</div>`; // Close member-grid

  // Global Tournament Insights
  const globalScorers = {};
  ALL_TEAMS.forEach(t => {
    const ts = teamStats[t.name];
    if (ts && ts.scorers) {
      Object.entries(ts.scorers).forEach(([pName, count]) => {
        globalScorers[pName] = (globalScorers[pName] || 0) + count;
      });
    }
  });
  const topScorers = Object.entries(globalScorers)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 5);

  const topAttacks = ALL_TEAMS.map(t => ({
    name: t.name,
    flag: t.flag,
    gf: teamStats[t.name] ? teamStats[t.name].gf : 0
  }))
  .sort((a, b) => b.gf - a.gf)
  .slice(0, 3);

  const topDefences = ALL_TEAMS.map(t => ({
    name: t.name,
    flag: t.flag,
    ga: teamStats[t.name] ? teamStats[t.name].ga : 0,
    played: teamStats[t.name] ? teamStats[t.name].played : 0
  }))
  .filter(t => t.played > 0)
  .sort((a, b) => a.ga - b.ga)
  .slice(0, 3);

  h += `<h3 class="insights-title">🏆 Tournament Insights</h3>
  <div class="insights-grid">
    <div class="insights-card">
      <h4>⚽ Golden Boot (Top Scorers)</h4>
      <div class="insights-list">`;
      
  if (topScorers.length > 0) {
    topScorers.forEach(([pName, count]) => {
      let pFlag = '⚽';
      for (const t of ALL_TEAMS) {
        if (teamStats[t.name] && teamStats[t.name].scorers[pName]) {
          pFlag = t.flag;
          break;
        }
      }
      h += `<div class="insight-item">
        <div class="insight-team"><span>${pFlag}</span><span>${pName}</span></div>
        <div class="insight-val">${count} goals</div>
      </div>`;
    });
  } else {
    h += `<div class="insight-item" style="color:var(--ink-3);font-style:italic">No goals scored yet</div>`;
  }
  
  h += `</div></div>
    <div class="insights-card">
      <h4>🔥 High-Octane Teams</h4>
      <div class="insights-list">`;
      
  if (topAttacks.some(t => t.gf > 0)) {
    topAttacks.forEach(t => {
      h += `<div class="insight-item">
        <div class="insight-team"><span>${t.flag}</span><span>${t.name}</span></div>
        <div class="insight-val">${t.gf} goals</div>
      </div>`;
    });
  } else {
    h += `<div class="insight-item" style="color:var(--ink-3);font-style:italic">No matches played yet</div>`;
  }
  
  h += `</div></div>
    <div class="insights-card">
      <h4>🛡️ Rock-Solid Defences</h4>
      <div class="insights-list">`;
      
  if (topDefences.length > 0) {
    topDefences.forEach(t => {
      h += `<div class="insight-item">
        <div class="insight-team"><span>${t.flag}</span><span>${t.name}</span></div>
        <div class="insight-val">${t.ga} conceded (${t.played} gp)</div>
      </div>`;
    });
  } else {
    h += `<div class="insight-item" style="color:var(--ink-3);font-style:italic">No matches played yet</div>`;
  }
  
  h += `</div></div></div>`;

  el.innerHTML = h;
}

function copyURL(el) {
  navigator.clipboard.writeText(shareURL()).then(() => {
    const btn = document.getElementById('copy-btn');
    if (btn) { btn.textContent='Copied!'; btn.classList.add('copied'); setTimeout(()=>{btn.textContent='Copy link';btn.classList.remove('copied');},2000); }
  }).catch(()=> { /* fallback */ });
}

/* ══════════════════════════════════════════════════
   RENDER: CALENDAR
══════════════════════════════════════════════════ */
let CAL_MEMBER='all', CAL_ROUND='all', CAL_SCORES=true;

function renderCal(forceScroll = false) {
  const el = document.getElementById('page-cal');
  const today = getTodayInTimezone(CAL_TZ);
  const out = computeKnockedOut();
  const myTeams = CAL_MEMBER!=='all' ? new Set(ALLOC[CAL_MEMBER]||[]) : null;
  const rounds = [...new Set(MATCHES.map(m=>m.r))].sort((a, b) => {
    const getRoundOrder = (r) => {
      const clean = r.toLowerCase().trim();
      if (clean.startsWith('matchday ')) {
        const num = parseInt(clean.substring(9), 10);
        return isNaN(num) ? 0 : num;
      }
      const order = {
        'round of 32': 18,
        'round of 16': 19,
        'quarter-final': 20,
        'semi-final': 21,
        'match for third place': 22,
        'final': 23
      };
      return order[clean] !== undefined ? order[clean] : 99;
    };
    return getRoundOrder(a) - getRoundOrder(b);
  });

  let visible = MATCHES.filter(m => {
    if (CAL_ROUND!=='all' && m.r!==CAL_ROUND) return false;
    if (!CAL_SCORES && m.s1!==undefined) return false;
    if (myTeams && !myTeams.has(m.a) && !myTeams.has(m.b)) return false;
    return true;
  }).map(m => {
    const { d, t } = getMatchDateTimeInTimezone(m, CAL_TZ);
    return { ...m, d, t, od: m.d };
  });

  const byDay = {};
  visible.forEach(m=>{ if(!byDay[m.d]) byDay[m.d]=[]; byDay[m.d].push(m); });
  const days = Object.keys(byDay).sort();

  const memOpts = CFG.members.map(m=>`<option value="${m}"${CAL_MEMBER===m?'selected':''}>${m}</option>`).join('');
  const rndOpts = rounds.map(r=>`<option value="${r}"${CAL_ROUND===r?'selected':''}>${r}</option>`).join('');

  let h = `<div class="cal-toolbar">
    <select onchange="CAL_MEMBER=this.value;renderCal()">
      <option value="all"${CAL_MEMBER==='all'?'selected':''}>All players</option>${memOpts}
    </select>
    <select onchange="CAL_ROUND=this.value;renderCal()">
      <option value="all"${CAL_ROUND==='all'?'selected':''}>All rounds</option>${rndOpts}
    </select>
    <label><input type="checkbox" ${CAL_SCORES?'checked':''} onchange="CAL_SCORES=this.checked;renderCal()"> Show played</label>
    <button class="spoilers-btn" onclick="revealAllScores()">👁️ Reveal All</button>
    <button class="spoilers-btn" onclick="hideAllScores()">🙈 Hide All</button>
  </div>`;

  if (!days.length) { h+=`<div class="empty"><strong>No matches</strong>Adjust the filters above.</div>`; el.innerHTML=h; return; }

  days.forEach(day => {
    const ms = byDay[day].sort((a,b)=>a.t.localeCompare(b.t));
    const isToday = day===today;
    const isPast  = day<today;
    const label   = new Date(day+'T12:00:00').toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long'});
    const playedCount = ms.filter(m=>m.s1!==undefined).length;

    h += `<div class="day-block">
      <div class="day-heading">
        ${label}
        ${isToday?'<span class="today-pill">TODAY</span>':''}
        ${isPast&&!isToday?`<span class="played-count">${playedCount}/${ms.length} played</span>`:''}
      </div>
      <div class="matches-grid">`;

    ms.forEach(m => {
      const scored = m.s1!==undefined;
      const t1=getTeam(m.a), t2=getTeam(m.b);
      const isMyMatch = myTeams&&(myTeams.has(m.a)||myTeams.has(m.b));
      const ko1=out.has(m.a), ko2=out.has(m.b);

      const matchKey = getMatchKey(m);
      const isRevealed = !scored || isMatchRevealed(m);
      const spoilerClass = (scored && !isRevealed) ? ' spoiler-hidden' : '';
      const revealAttr = (scored && !isRevealed) ? `onclick="revealMatch('${matchKey}')" style="cursor:pointer" title="Click to reveal"` : '';

      const goals1Html = m.goals1 && m.goals1.length > 0 && isRevealed
        ? `<div class="team-scorers">⚽ ${m.goals1.map(g => `${g.name} (${g.minute}')`).join(', ')}</div>`
        : '';
      const goals2Html = m.goals2 && m.goals2.length > 0 && isRevealed
        ? `<div class="team-scorers">⚽ ${m.goals2.map(g => `${g.name} (${g.minute}')`).join(', ')}</div>`
        : '';

      const statusText = scored ? (m.status || 'FT') : m.t;
      const statusClass = scored ? 'status-final' : '';
      const statusHtml = (scored && !isRevealed)
        ? `<button class="reveal-btn" onclick="revealMatch('${matchKey}')">👁️ Reveal</button>`
        : `<span class="match-time-status ${statusClass}">${statusText}</span>`;

      h += `<div class="match-card${isMyMatch?' my-match':''}${spoilerClass}">
        <div class="match-card-header">
          <span class="round-badge">${m.g?'Group '+m.g:m.r.replace('Match for third place','3rd place')}</span>
          ${statusHtml}
        </div>
        <div class="match-card-body">
          <div class="team-row">
            <div class="team-info">
              ${t1 ? `<span class="team-flag">${t1.flag}</span>` : `<span class="team-flag-placeholder"></span>`}
              <span class="team-name${ko1?' out':''}">${m.a}</span>
              ${ownerChip(m.a)}
            </div>
            <div class="team-score-wrapper" ${revealAttr}>
              <span class="team-score">${scored?m.s1:''}</span>
              ${scored && m.p1 !== undefined && isRevealed ? `<span class="pens-score">(${m.p1})</span>` : ''}
            </div>
          </div>
          ${goals1Html}
          <div class="team-row">
            <div class="team-info">
              ${t2 ? `<span class="team-flag">${t2.flag}</span>` : `<span class="team-flag-placeholder"></span>`}
              <span class="team-name${ko2?' out':''}">${m.b}</span>
              ${ownerChip(m.b)}
            </div>
            <div class="team-score-wrapper" ${revealAttr}>
              <span class="team-score">${scored?m.s2:''}</span>
              ${scored && m.p2 !== undefined && isRevealed ? `<span class="pens-score">(${m.p2})</span>` : ''}
            </div>
          </div>
          ${goals2Html}
        </div>
        <div class="match-card-footer">
          <span class="match-venue">📍 ${m.v || 'TBD'}</span>
        </div>
      </div>`;
    });
    h += `</div></div>`;
  });

  el.innerHTML = h;
  const firstMatchConverted = MATCHES[0] ? getMatchDateTimeInTimezone(MATCHES[0], CAL_TZ).d : '';
  if (forceScroll && today>=firstMatchConverted) {
    const todayEl = el.querySelector('.today-pill');
    if (todayEl) setTimeout(()=>todayEl.closest('.day-block').scrollIntoView({behavior:'smooth',block:'start'}),80);
  }
}

/* ══════════════════════════════════════════════════
   RENDER: RESULTS
══════════════════════════════════════════════════ */
function renderResults() {
  const el = document.getElementById('page-results');
  const out = computeKnockedOut();
  const scored = MATCHES.filter(m=>m.s1!==undefined)
    .map(m => {
      const { d, t } = getMatchDateTimeInTimezone(m, CAL_TZ);
      return { ...m, d, t, od: m.d };
    })
    .sort((a,b)=>b.d.localeCompare(a.d)||b.t.localeCompare(a.t));

  let h = `<div class="results-header" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap;gap:10px">
    <p class="results-intro" style="margin-bottom:0">${scored.length} result${scored.length!==1?'s':''} · sourced from <a href="https://github.com/openfootball/worldcup.json" target="_blank">openfootball</a> · <a href="#" onclick="doRefresh();return false;">refresh now</a></p>`;
  if (scored.length > 0) {
    h += `<div style="display:flex;gap:8px">
      <button class="spoilers-btn" onclick="revealAllScores()">👁️ Reveal All</button>
      <button class="spoilers-btn" onclick="hideAllScores()">🙈 Hide All</button>
    </div>`;
  }
  h += `</div>`;

  if (!scored.length) {
    h += `<div class="empty"><strong>No results yet</strong>The tournament kicks off 11 June 2026. Results appear here automatically — just hit Refresh.</div>`;
  } else {
    const byRound = {};
    scored.forEach(m=>{ if(!byRound[m.r]) byRound[m.r]=[]; byRound[m.r].push(m); });
    Object.entries(byRound).forEach(([round,ms])=>{
      h += `<div class="round-heading">${round}</div>`;
      h += `<div class="matches-grid">`;
      ms.forEach(m=>{
        const t1=getTeam(m.a), t2=getTeam(m.b);
        const ko1=out.has(m.a), ko2=out.has(m.b);

        const matchKey = getMatchKey(m);
        const isRevealed = isMatchRevealed(m);
        const spoilerClass = !isRevealed ? ' spoiler-hidden' : '';
        const revealAttr = !isRevealed ? `onclick="revealMatch('${matchKey}')" style="cursor:pointer" title="Click to reveal"` : '';

        const goals1Html = m.goals1 && m.goals1.length > 0 && isRevealed
          ? `<div class="team-scorers">⚽ ${m.goals1.map(g => `${g.name} (${g.minute}')`).join(', ')}</div>`
          : '';
        const goals2Html = m.goals2 && m.goals2.length > 0 && isRevealed
          ? `<div class="team-scorers">⚽ ${m.goals2.map(g => `${g.name} (${g.minute}')`).join(', ')}</div>`
          : '';

        const statusText = m.status || 'FT';
        const formattedDate = new Date(m.d + 'T12:00:00').toLocaleDateString('en-US', { day: 'numeric', month: 'short' });
        const statusHtml = !isRevealed
          ? `<button class="reveal-btn" onclick="revealMatch('${matchKey}')">👁️ Reveal</button>`
          : `<span class="match-time-status status-final">${statusText}</span>`;

        h += `<div class="match-card${spoilerClass}">
          <div class="match-card-header">
            <span class="round-badge">${m.g?'Group '+m.g:m.r.replace('Match for third place','3rd place')}</span>
            ${statusHtml}
          </div>
          <div class="match-card-body">
            <div class="team-row">
              <div class="team-info">
                ${t1 ? `<span class="team-flag">${t1.flag}</span>` : `<span class="team-flag-placeholder"></span>`}
                <span class="team-name${ko1?' out':''}">${m.a}</span>
                ${ownerChip(m.a)}
              </div>
              <div class="team-score-wrapper" ${revealAttr}>
                <span class="team-score">${m.s1}</span>
                ${m.p1 !== undefined && isRevealed ? `<span class="pens-score">(${m.p1})</span>` : ''}
              </div>
            </div>
            ${goals1Html}
            <div class="team-row">
              <div class="team-info">
                ${t2 ? `<span class="team-flag">${t2.flag}</span>` : `<span class="team-flag-placeholder"></span>`}
                <span class="team-name${ko2?' out':''}">${m.b}</span>
                ${ownerChip(m.b)}
              </div>
              <div class="team-score-wrapper" ${revealAttr}>
                <span class="team-score">${m.s2}</span>
                ${m.p2 !== undefined && isRevealed ? `<span class="pens-score">(${m.p2})</span>` : ''}
              </div>
            </div>
            ${goals2Html}
          </div>
          <div class="match-card-footer">
            <span class="match-venue">📍 ${m.v || 'TBD'}</span>
            <span class="match-date">${formattedDate}</span>
          </div>
        </div>`;
      });
      h += `</div>`;
    });
  }
  el.innerHTML = h;
}

/* ══════════════════════════════════════════════════
   RENDER: GROUPS
══════════════════════════════════════════════════ */
function computeStandings() {
  const standings = {};
  ALL_TEAMS.forEach(t => {
    standings[t.name] = {
      name: t.name,
      flag: t.flag,
      group: t.group,
      tier: t.tier,
      played: 0,
      won: 0,
      drawn: 0,
      lost: 0,
      gf: 0,
      ga: 0,
      gd: 0,
      pts: 0
    };
  });

  MATCHES.forEach(m => {
    if (m.g && m.s1 !== undefined && m.s2 !== undefined && isMatchRevealed(m)) {
      const t1 = standings[m.a];
      const t2 = standings[m.b];
      if (t1 && t2) {
        t1.played++;
        t2.played++;
        t1.gf += m.s1;
        t1.ga += m.s2;
        t2.gf += m.s2;
        t2.ga += m.s1;
        t1.gd = t1.gf - t1.ga;
        t2.gd = t2.gf - t2.ga;

        if (m.s1 > m.s2) {
          t1.won++;
          t1.pts += 3;
          t2.lost++;
        } else if (m.s2 > m.s1) {
          t2.won++;
          t2.pts += 3;
          t1.lost++;
        } else {
          t1.drawn++;
          t1.pts += 1;
          t2.drawn++;
          t2.pts += 1;
        }
      }
    }
  });

  return standings;
}

function renderGroups() {
  const el = document.getElementById('page-groups');
  const out = computeKnockedOut();
  const standings = computeStandings();
  const groups = ['A','B','C','D','E','F','G','H','I','J','K','L'];
  
  let h = `<div class="groups-grid">`;
  
  groups.forEach(g => {
    const teamsInGroup = ALL_TEAMS.filter(t => t.group === g).map(t => standings[t.name]);
    
    teamsInGroup.sort((a, b) => {
      if (b.pts !== a.pts) return b.pts - a.pts;
      if (b.gd !== a.gd) return b.gd - a.gd;
      if (b.gf !== a.gf) return b.gf - a.gf;
      return a.name.localeCompare(b.name);
    });

    h += `<div class="group-card">
      <div class="group-title">Group ${g}</div>
      <table class="group-table">
        <thead>
          <tr>
            <th style="width: 14px;"></th>
            <th>Team</th>
            <th class="num" title="Played">P</th>
            <th class="num" title="Won-Drawn-Lost">W-D-L</th>
            <th class="num" title="Goal Difference">GD</th>
            <th class="num" title="Points">PTS</th>
          </tr>
        </thead>
        <tbody>`;

    teamsInGroup.forEach((t, index) => {
      const owner = getOwner(t.name);
      const isOut = out.has(t.name);
      const idx = owner ? CFG.members.indexOf(owner) : -1;
      const c = idx >= 0 ? memberColor(idx) : null;
      
      const gdSign = t.gd > 0 ? '+' : '';
      
      h += `<tr class="${isOut ? 'out' : ''}">
        <td class="group-pos">${index + 1}</td>
        <td>
          <div class="group-team-cell">
            <span class="g-flag">${t.flag}</span>
            <span class="g-name" title="${t.name}">${t.name}</span>
            <span class="t-badge t${t.tier}" style="font-size:9px">T${t.tier}</span>
            ${c ? `<span class="owner-chip" style="background:${c.bg};color:${c.chip}">${owner.substring(0,3)}</span>` : ''}
          </div>
        </td>
        <td class="num">${t.played}</td>
        <td class="num" style="white-space: nowrap;">${t.won}-${t.drawn}-${t.lost}</td>
        <td class="num">${gdSign}${t.gd}</td>
        <td class="num" style="font-weight: 700; color: var(--ink);">${t.pts}</td>
      </tr>`;
    });

    h += `</tbody>
      </table>
    </div>`;
  });

  h += `</div>`;
  el.innerHTML = h;
}

/* ══════════════════════════════════════════════════
   TAB ROUTING
══════════════════════════════════════════════════ */
let activeTab = 'dash';
function showTab(t) {
  activeTab = t;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('on'));
  document.getElementById('page-'+t).classList.add('on');
  document.querySelectorAll('.nav-tab')[['dash','cal','results','groups'].indexOf(t)].classList.add('on');
  if (t === 'cal') {
    renderCal(true);
  } else {
    render();
  }
}

function render() {
  if (!CFG.members.length) return;
  if (activeTab==='dash')    renderDash();
  else if (activeTab==='cal')     renderCal();
  else if (activeTab==='results') renderResults();
  else if (activeTab==='groups')  renderGroups();
}

/* ══════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════ */
(function init() {
  // Set initial timezone select value
  const sel = document.getElementById('tz-select');
  if (sel) sel.value = CAL_TZ;

  // Populate modal with default names so it's ready
  ['','','',''].forEach(n => addMemberField(n));
  randomSeed();

  // Check URL hash first
  const fromURL = parseHash();
  if (fromURL) {
    applyConfig(fromURL);
    setStatus(`Embedded schedule · ${EMBEDDED.length} matches · hit Refresh for latest results`);
    doRefresh();
  } else {
    // Show setup modal — pre-fill with sensible defaults
    document.getElementById('member-inputs').querySelectorAll('input')[0] && null;
    setStatus('Configure your tracker to get started');
  }
})();
</script>
